<svg width="1000" height="650" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="650" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#059669" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        Canary Deployment Controller (Progressive Release Automation)
    </text>
    
    <!-- CI/CD Trigger Layer -->
    <rect x="30" y="70" width="940" height="80" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#047857">CI/CD INTEGRATION LAYER</text>
    
    <!-- CI/CD components -->
    <rect x="80" y="110" width="150" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="155" y="128" text-anchor="middle" font-size="11" fill="#14532d">Git Webhook</text>
    
    <rect x="250" y="110" width="150" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="325" y="128" text-anchor="middle" font-size="11" fill="#14532d">Build Pipeline</text>
    
    <rect x="420" y="110" width="150" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="495" y="128" text-anchor="middle" font-size="11" fill="#14532d">Image Registry</text>
    
    <rect x="590" y="110" width="150" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="665" y="128" text-anchor="middle" font-size="11" fill="#14532d">Release Config</text>
    
    <rect x="760" y="110" width="150" height="30" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="835" y="128" text-anchor="middle" font-size="10" fill="#4338ca">Deployment Trigger</text>
    
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Arrow down -->
    <line x1="500" y1="155" x2="500" y2="180" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Canary Controller Core -->
    <rect x="30" y="190" width="940" height="120" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="6"/>
    <text x="50" y="215" font-size="14" font-weight="bold" fill="#c2410c">CANARY DEPLOYMENT CONTROLLER</text>
    
    <!-- Controller components -->
    <rect x="60" y="230" width="180" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="150" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Traffic Splitter</text>
    <text x="150" y="265" text-anchor="middle" font-size="10" fill="#c2410c">Istio/Envoy routing</text>
    <text x="150" y="278" text-anchor="middle" font-size="10" fill="#c2410c">Weighted routing rules</text>
    <text x="150" y="291" text-anchor="middle" font-size="10" fill="#c2410c">Header-based routing</text>
    
    <rect x="260" y="230" width="180" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="350" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Metrics Collector</text>
    <text x="350" y="265" text-anchor="middle" font-size="10" fill="#c2410c">Prometheus/Grafana</text>
    <text x="350" y="278" text-anchor="middle" font-size="10" fill="#c2410c">Real-time SLI tracking</text>
    <text x="350" y="291" text-anchor="middle" font-size="10" fill="#c2410c">Statistical comparison</text>
    
    <rect x="460" y="230" width="180" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="550" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Decision Engine</text>
    <text x="550" y="265" text-anchor="middle" font-size="10" fill="#c2410c">ML-based analysis</text>
    <text x="550" y="278" text-anchor="middle" font-size="10" fill="#c2410c">Error budget aware</text>
    <text x="550" y="291" text-anchor="middle" font-size="10" fill="#c2410c">Rollback triggers</text>
    
    <rect x="660" y="230" width="180" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="750" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Rollout Manager</text>
    <text x="750" y="265" text-anchor="middle" font-size="10" fill="#c2410c">Progressive phases</text>
    <text x="750" y="278" text-anchor="middle" font-size="10" fill="#c2410c">Deployment policies</text>
    <text x="750" y="291" text-anchor="middle" font-size="10" fill="#c2410c">Audit logging</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="315" x2="500" y2="340" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Deployment Targets -->
    <rect x="30" y="350" width="940" height="120" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="50" y="375" font-size="14" font-weight="bold" fill="#15803d">DEPLOYMENT TARGETS (Multi-Region K8s)</text>
    
    <!-- Regional deployments -->
    <rect x="80" y="390" width="200" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="180" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">US-WEST CLUSTER</text>
    <text x="180" y="425" text-anchor="middle" font-size="10" fill="#166534">Baseline: 95% traffic</text>
    <text x="180" y="438" text-anchor="middle" font-size="10" fill="#166534">Canary: 5% traffic</text>
    <text x="180" y="451" text-anchor="middle" font-size="10" fill="#166534">A/B testing pods</text>
    
    <rect x="300" y="390" width="200" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="400" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">US-EAST CLUSTER</text>
    <text x="400" y="425" text-anchor="middle" font-size="10" fill="#166534">Baseline: 95% traffic</text>
    <text x="400" y="438" text-anchor="middle" font-size="10" fill="#166534">Canary: 5% traffic</text>
    <text x="400" y="451" text-anchor="middle" font-size="10" fill="#166534">A/B testing pods</text>
    
    <rect x="520" y="390" width="200" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="620" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">EU-WEST CLUSTER</text>
    <text x="620" y="425" text-anchor="middle" font-size="10" fill="#166534">Baseline: 95% traffic</text>
    <text x="620" y="438" text-anchor="middle" font-size="10" fill="#166534">Canary: 5% traffic</text>
    <text x="620" y="451" text-anchor="middle" font-size="10" fill="#166534">A/B testing pods</text>
    
    <rect x="740" y="390" width="180" height="70" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="830" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">Progressive Rollout</text>
    <text x="830" y="425" text-anchor="middle" font-size="9" fill="#4338ca">Phase 1: 1% ’ 5%</text>
    <text x="830" y="438" text-anchor="middle" font-size="9" fill="#4338ca">Phase 2: 10% ’ 25%</text>
    <text x="830" y="451" text-anchor="middle" font-size="9" fill="#4338ca">Phase 3: 50% ’ 100%</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="475" x2="500" y2="500" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Observability Layer -->
    <rect x="30" y="510" width="940" height="120" fill="#fef7ff" stroke="#a855f7" stroke-width="2" rx="6"/>
    <text x="50" y="535" font-size="14" font-weight="bold" fill="#7e22ce">OBSERVABILITY &amp; SAFETY LAYER</text>
    
    <!-- Observability components -->
    <rect x="60" y="550" width="160" height="70" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="140" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">SLI Tracking</text>
    <text x="140" y="585" text-anchor="middle" font-size="9" fill="#7c3aed">Latency p95/p99</text>
    <text x="140" y="596" text-anchor="middle" font-size="9" fill="#7c3aed">Error rate %</text>
    <text x="140" y="607" text-anchor="middle" font-size="9" fill="#7c3aed">Throughput QPS</text>
    <text x="140" y="618" text-anchor="middle" font-size="9" fill="#7c3aed">Resource usage</text>
    
    <rect x="240" y="550" width="160" height="70" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="320" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Statistical Tests</text>
    <text x="320" y="585" text-anchor="middle" font-size="9" fill="#7c3aed">Mann-Whitney U</text>
    <text x="320" y="596" text-anchor="middle" font-size="9" fill="#7c3aed">T-test significance</text>
    <text x="320" y="607" text-anchor="middle" font-size="9" fill="#7c3aed">Confidence intervals</text>
    <text x="320" y="618" text-anchor="middle" font-size="9" fill="#7c3aed">Effect size calc</text>
    
    <rect x="420" y="550" width="160" height="70" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="500" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Safety Circuits</text>
    <text x="500" y="585" text-anchor="middle" font-size="9" fill="#7c3aed">Error budget check</text>
    <text x="500" y="596" text-anchor="middle" font-size="9" fill="#7c3aed">Rollback triggers</text>
    <text x="500" y="607" text-anchor="middle" font-size="9" fill="#7c3aed">Manual override</text>
    <text x="500" y="618" text-anchor="middle" font-size="9" fill="#7c3aed">Emergency stop</text>
    
    <rect x="600" y="550" width="160" height="70" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="680" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Alerting</text>
    <text x="680" y="585" text-anchor="middle" font-size="9" fill="#7c3aed">Slack notifications</text>
    <text x="680" y="596" text-anchor="middle" font-size="9" fill="#7c3aed">PagerDuty alerts</text>
    <text x="680" y="607" text-anchor="middle" font-size="9" fill="#7c3aed">Dashboard updates</text>
    <text x="680" y="618" text-anchor="middle" font-size="9" fill="#7c3aed">Deployment logs</text>
    
    <rect x="780" y="550" width="160" height="70" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="4"/>
    <text x="860" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">Audit Trail</text>
    <text x="860" y="585" text-anchor="middle" font-size="9" fill="#f59e0b">Decision history</text>
    <text x="860" y="596" text-anchor="middle" font-size="9" fill="#f59e0b">Rollback reasons</text>
    <text x="860" y="607" text-anchor="middle" font-size="9" fill="#f59e0b">Performance data</text>
    <text x="860" y="618" text-anchor="middle" font-size="9" fill="#f59e0b">Compliance logs</text>
</svg>