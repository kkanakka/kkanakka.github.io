<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 18px Arial; text-anchor: middle; fill: #333; }
      .axis-label { font: bold 14px Arial; text-anchor: middle; fill: #333; }
      .system-label { font: 12px Arial; text-anchor: middle; fill: #fff; font-weight: bold; }
      .quadrant-label { font: bold 16px Arial; fill: #666; }
      .grid-line { stroke: #ddd; stroke-width: 1; }
      .axis-line { stroke: #333; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f9f9f9"/>
  
  <!-- Title -->
  <text x="400" y="30" class="title">Database Selection Matrix: Consistency vs Scale</text>
  
  <!-- Grid lines -->
  <g class="grid">
    <line x1="100" y1="80" x2="700" y2="80" class="grid-line"/>
    <line x1="100" y1="180" x2="700" y2="180" class="grid-line"/>
    <line x1="100" y1="280" x2="700" y2="280" class="grid-line"/>
    <line x1="100" y1="380" x2="700" y2="380" class="grid-line"/>
    <line x1="100" y1="480" x2="700" y2="480" class="grid-line"/>
    
    <line x1="100" y1="80" x2="100" y2="520" class="grid-line"/>
    <line x1="200" y1="80" x2="200" y2="520" class="grid-line"/>
    <line x1="300" y1="80" x2="300" y2="520" class="grid-line"/>
    <line x1="400" y1="80" x2="400" y2="520" class="grid-line"/>
    <line x1="500" y1="80" x2="500" y2="520" class="grid-line"/>
    <line x1="600" y1="80" x2="600" y2="520" class="grid-line"/>
    <line x1="700" y1="80" x2="700" y2="520" class="grid-line"/>
  </g>
  
  <!-- Axes -->
  <line x1="100" y1="520" x2="700" y2="520" class="axis-line"/>
  <line x1="100" y1="80" x2="100" y2="520" class="axis-line"/>
  
  <!-- Axis labels -->
  <text x="400" y="550" class="axis-label">Scale (Writes per Second)</text>
  <text x="50" y="300" class="axis-label" transform="rotate(-90, 50, 300)">Consistency Requirements</text>
  
  <!-- Scale labels -->
  <text x="150" y="540" style="font: 10px Arial; text-anchor: middle;">1K</text>
  <text x="250" y="540" style="font: 10px Arial; text-anchor: middle;">10K</text>
  <text x="350" y="540" style="font: 10px Arial; text-anchor: middle;">100K</text>
  <text x="450" y="540" style="font: 10px Arial; text-anchor: middle;">1M</text>
  <text x="550" y="540" style="font: 10px Arial; text-anchor: middle;">10M</text>
  <text x="650" y="540" style="font: 10px Arial; text-anchor: middle;">100M</text>
  
  <!-- Consistency labels -->
  <text x="90" y="120" style="font: 10px Arial; text-anchor: end;">Strong</text>
  <text x="90" y="220" style="font: 10px Arial; text-anchor: end;">Causal</text>
  <text x="90" y="320" style="font: 10px Arial; text-anchor: end;">Session</text>
  <text x="90" y="420" style="font: 10px Arial; text-anchor: end;">Eventual</text>
  <text x="90" y="500" style="font: 10px Arial; text-anchor: end;">None</text>
  
  <!-- Database systems positioned by scale and consistency -->
  
  <!-- PostgreSQL - Strong consistency, low-medium scale -->
  <rect x="120" y="100" width="80" height="30" fill="#336699" rx="5"/>
  <text x="160" y="120" class="system-label">PostgreSQL</text>
  
  <!-- MySQL - Strong consistency, medium scale -->
  <rect x="220" y="110" width="60" height="30" fill="#4682B4" rx="5"/>
  <text x="250" y="130" class="system-label">MySQL</text>
  
  <!-- Espresso - Strong consistency, high scale -->
  <rect x="420" y="90" width="70" height="30" fill="#2E8B57" rx="5"/>
  <text x="455" y="110" class="system-label">Espresso</text>
  
  <!-- Spanner - Strong consistency, very high scale -->
  <rect x="520" y="95" width="60" height="30" fill="#228B22" rx="5"/>
  <text x="550" y="115" class="system-label">Spanner</text>
  
  <!-- MongoDB - Session consistency, medium scale -->
  <rect x="280" y="290" width="70" height="30" fill="#FF6347" rx="5"/>
  <text x="315" y="310" class="system-label">MongoDB</text>
  
  <!-- DynamoDB - Eventual consistency, high scale -->
  <rect x="450" y="390" width="80" height="30" fill="#FF8C00" rx="5"/>
  <text x="490" y="410" class="system-label">DynamoDB</text>
  
  <!-- Cassandra - Eventual consistency, very high scale -->
  <rect x="550" y="400" width="80" height="30" fill="#DC143C" rx="5"/>
  <text x="590" y="420" class="system-label">Cassandra</text>
  
  <!-- Redis - Session consistency, medium scale -->
  <rect x="320" y="280" width="50" height="30" fill="#8B008B" rx="5"/>
  <text x="345" y="300" class="system-label">Redis</text>
  
  <!-- Memcached - None consistency, high scale -->
  <rect x="480" y="480" width="80" height="30" fill="#A0522D" rx="5"/>
  <text x="520" y="500" class="system-label">Memcached</text>
  
  <!-- Quadrant labels -->
  <text x="200" y="150" class="quadrant-label">Traditional RDBMS</text>
  <text x="550" y="150" class="quadrant-label">Distributed SQL</text>
  <text x="200" y="450" class="quadrant-label">Document/KV</text>
  <text x="550" y="470" class="quadrant-label">NoSQL/Cache</text>
  
  <!-- Legend -->
  <rect x="520" y="560" width="260" height="30" fill="#f0f0f0" stroke="#ccc"/>
  <text x="525" y="575" style="font: 10px Arial; font-weight: bold;">LinkedIn Usage:</text>
  <text x="525" y="585" style="font: 9px Arial;">Circle size = relative usage scale at LinkedIn</text>
</svg>