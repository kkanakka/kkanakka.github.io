<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 18px Arial; text-anchor: middle; fill: #333; }
      .axis-label { font: bold 14px Arial; text-anchor: middle; fill: #333; }
      .storage-label { font: 11px Arial; text-anchor: middle; fill: #fff; font-weight: bold; }
      .grid-line { stroke: #ddd; stroke-width: 1; }
      .axis-line { stroke: #333; stroke-width: 2; }
      .tier-label { font: bold 14px Arial; fill: #666; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f9f9f9"/>
  
  <!-- Title -->
  <text x="400" y="30" class="title">Storage Systems: Cost vs Performance Trade-off</text>
  
  <!-- Grid lines -->
  <g class="grid">
    <line x1="80" y1="70" x2="720" y2="70" class="grid-line"/>
    <line x1="80" y1="140" x2="720" y2="140" class="grid-line"/>
    <line x1="80" y1="210" x2="720" y2="210" class="grid-line"/>
    <line x1="80" y1="280" x2="720" y2="280" class="grid-line"/>
    <line x1="80" y1="350" x2="720" y2="350" class="grid-line"/>
    <line x1="80" y1="420" x2="720" y2="420" class="grid-line"/>
    <line x1="80" y1="490" x2="720" y2="490" class="grid-line"/>
    
    <line x1="80" y1="70" x2="80" y2="490" class="grid-line"/>
    <line x1="160" y1="70" x2="160" y2="490" class="grid-line"/>
    <line x1="240" y1="70" x2="240" y2="490" class="grid-line"/>
    <line x1="320" y1="70" x2="320" y2="490" class="grid-line"/>
    <line x1="400" y1="70" x2="400" y2="490" class="grid-line"/>
    <line x1="480" y1="70" x2="480" y2="490" class="grid-line"/>
    <line x1="560" y1="70" x2="560" y2="490" class="grid-line"/>
    <line x1="640" y1="70" x2="640" y2="490" class="grid-line"/>
    <line x1="720" y1="70" x2="720" y2="490" class="grid-line"/>
  </g>
  
  <!-- Axes -->
  <line x1="80" y1="490" x2="720" y2="490" class="axis-line"/>
  <line x1="80" y1="70" x2="80" y2="490" class="axis-line"/>
  
  <!-- Axis labels -->
  <text x="400" y="520" class="axis-label">Random IOPS Performance (Log Scale)</text>
  <text x="40" y="280" class="axis-label" transform="rotate(-90, 40, 280)">Cost per TB per Month ($)</text>
  
  <!-- Performance scale (log) -->
  <text x="120" y="510" style="font: 10px Arial; text-anchor: middle;">100</text>
  <text x="200" y="510" style="font: 10px Arial; text-anchor: middle;">1K</text>
  <text x="280" y="510" style="font: 10px Arial; text-anchor: middle;">10K</text>
  <text x="360" y="510" style="font: 10px Arial; text-anchor: middle;">100K</text>
  <text x="440" y="510" style="font: 10px Arial; text-anchor: middle;">1M</text>
  <text x="520" y="510" style="font: 10px Arial; text-anchor: middle;">10M</text>
  <text x="600" y="510" style="font: 10px Arial; text-anchor: middle;">100M</text>
  
  <!-- Cost labels -->
  <text x="70" y="480" style="font: 10px Arial; text-anchor: end;">$5</text>
  <text x="70" y="420" style="font: 10px Arial; text-anchor: end;">$25</text>
  <text x="70" y="360" style="font: 10px Arial; text-anchor: end;">$50</text>
  <text x="70" y="300" style="font: 10px Arial; text-anchor: end;">$100</text>
  <text x="70" y="240" style="font: 10px Arial; text-anchor: end;">$250</text>
  <text x="70" y="180" style="font: 10px Arial; text-anchor: end;">$500</text>
  <text x="70" y="120" style="font: 10px Arial; text-anchor: end;">$1000</text>
  
  <!-- Storage systems positioned by performance and cost -->
  
  <!-- HDD - Low performance, very low cost -->
  <circle cx="120" cy="460" r="25" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <text x="120" y="465" class="storage-label">HDD</text>
  <text x="120" y="495" style="font: 9px Arial; text-anchor: middle; fill: #333;">200 IOPS</text>
  
  <!-- SATA SSD - Medium performance, low cost -->
  <circle cx="320" cy="390" r="30" fill="#4682B4" stroke="#2F5F8F" stroke-width="2"/>
  <text x="320" y="395" class="storage-label">SATA SSD</text>
  <text x="320" y="425" style="font: 9px Arial; text-anchor: middle; fill: #333;">100K IOPS</text>
  
  <!-- NVMe SSD - High performance, high cost -->
  <circle cx="460" cy="200" r="35" fill="#FF4500" stroke="#CD3700" stroke-width="2"/>
  <text x="460" y="205" class="storage-label">NVMe SSD</text>
  <text x="460" y="240" style="font: 9px Arial; text-anchor: middle; fill: #333;">500K IOPS</text>
  
  <!-- S3 Standard - Variable performance, medium cost -->
  <rect x="140" y="340" width="60" height="25" fill="#FF8C00" stroke="#FF7F00" stroke-width="2" rx="5"/>
  <text x="170" y="358" class="storage-label">S3 Std</text>
  <text x="170" y="380" style="font: 9px Arial; text-anchor: middle; fill: #333;">3.5K GET/s</text>
  
  <!-- S3 Glacier - Very low performance, very low cost -->
  <rect x="90" y="470" width="50" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="2" rx="5"/>
  <text x="115" y="484" class="storage-label">Glacier</text>
  
  <!-- HDFS - Medium performance, low cost -->
  <rect x="240" y="400" width="50" height="25" fill="#228B22" stroke="#006400" stroke-width="2" rx="5"/>
  <text x="265" y="418" class="storage-label">HDFS</text>
  
  <!-- LinkedIn Espresso Storage - High performance, very high cost -->
  <circle cx="500" cy="120" r="30" fill="#8B008B" stroke="#4B0082" stroke-width="2"/>
  <text x="500" y="125" class="storage-label">Espresso</text>
  <text x="500" y="155" style="font: 9px Arial; text-anchor: middle; fill: #333;">Custom</text>
  
  <!-- Redis Memory - Ultra high performance, ultra high cost -->
  <circle cx="580" cy="90" r="25" fill="#DC143C" stroke="#B22222" stroke-width="2"/>
  <text x="580" y="95" class="storage-label">Redis</text>
  <text x="580" y="125" style="font: 9px Arial; text-anchor: middle; fill: #333;">Memory</text>
  
  <!-- Tier boundaries -->
  <path d="M 80 440 Q 200 420 320 380 Q 440 340 560 280" stroke="#666" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  <text x="150" y="435" style="font: 12px Arial; font-style: italic; fill: #666;">Cost/Performance Frontier</text>
  
  <!-- Tier labels -->
  <text x="100" y="440" class="tier-label" fill="#8B4513">Cold Storage</text>
  <text x="300" y="370" class="tier-label" fill="#4682B4">Warm Storage</text>
  <text x="520" y="160" class="tier-label" fill="#FF4500">Hot Storage</text>
  
  <!-- LinkedIn usage annotations -->
  <g stroke="#0077B5" stroke-width="1" fill="none">
    <path d="M 460 240 L 480 260" stroke-dasharray="2,2"/>
    <rect x="480" y="260" width="120" height="40" fill="#E7F3FF" stroke="#0077B5"/>
    <text x="485" y="275" style="font: 10px Arial; fill: #0077B5; font-weight: bold;">LinkedIn Hot Data</text>
    <text x="485" y="285" style="font: 9px Arial; fill: #0077B5;">Member profiles</text>
    <text x="485" y="295" style="font: 9px Arial; fill: #0077B5;">Feed generation</text>
  </g>
  
  <g stroke="#0077B5" stroke-width="1" fill="none">
    <path d="M 320 425 L 350 440" stroke-dasharray="2,2"/>
    <rect x="350" y="440" width="120" height="40" fill="#E7F3FF" stroke="#0077B5"/>
    <text x="355" y="455" style="font: 10px Arial; fill: #0077B5; font-weight: bold;">LinkedIn Warm</text>
    <text x="355" y="465" style="font: 9px Arial; fill: #0077B5;">Analytics data</text>
    <text x="355" y="475" style="font: 9px Arial; fill: #0077B5;">Search indices</text>
  </g>
  
  <!-- Legend -->
  <rect x="520" y="350" width="190" height="120" fill="#f8f8f8" stroke="#ccc"/>
  <text x="525" y="365" style="font: 12px Arial; font-weight: bold;">LinkedIn Storage Tiers</text>
  
  <circle cx="535" cy="380" r="8" fill="#DC143C"/>
  <text x="550" y="385" style="font: 10px Arial;">Hot: <1ms latency, $500+/TB</text>
  
  <circle cx="535" cy="400" r="8" fill="#FF4500"/>
  <text x="550" y="405" style="font: 10px Arial;">Warm: <50ms latency, $50-200/TB</text>
  
  <circle cx="535" cy="420" r="8" fill="#228B22"/>
  <text x="550" y="425" style="font: 10px Arial;">Cool: <1s latency, $10-50/TB</text>
  
  <circle cx="535" cy="440" r="8" fill="#8B4513"/>
  <text x="550" y="445" style="font: 10px Arial;">Cold: >10s latency, <$10/TB</text>
  
  <text x="525" y="460" style="font: 9px Arial; fill: #666;">Circle size = LinkedIn usage volume</text>
</svg>