<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="800" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#1a73e8" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        Global Monitoring &amp; Alerting Platform (100M metrics/sec)
    </text>
    
    <!-- Producers Layer -->
    <rect x="30" y="70" width="940" height="120" fill="#e8f0fe" stroke="#4285f4" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#1565c0">PRODUCERS LAYER</text>
    
    <!-- Producer components -->
    <rect x="60" y="110" width="180" height="70" fill="#c8d6e5" stroke="#2c5aa0" stroke-width="2" rx="4"/>
    <text x="150" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Services</text>
    <text x="150" y="145" text-anchor="middle" font-size="10" fill="#374151">gRPC/HTTP Telemetry</text>
    <text x="150" y="158" text-anchor="middle" font-size="10" fill="#374151">Client Certificates</text>
    <text x="150" y="171" text-anchor="middle" font-size="10" fill="#374151">Auto-discovery</text>
    
    <rect x="260" y="110" width="180" height="70" fill="#c8d6e5" stroke="#2c5aa0" stroke-width="2" rx="4"/>
    <text x="350" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Infrastructure</text>
    <text x="350" y="145" text-anchor="middle" font-size="10" fill="#374151">Prometheus Agents</text>
    <text x="350" y="158" text-anchor="middle" font-size="10" fill="#374151">Node Exporters</text>
    <text x="350" y="171" text-anchor="middle" font-size="10" fill="#374151">K8s Metrics</text>
    
    <rect x="460" y="110" width="180" height="70" fill="#c8d6e5" stroke="#2c5aa0" stroke-width="2" rx="4"/>
    <text x="550" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Applications</text>
    <text x="550" y="145" text-anchor="middle" font-size="10" fill="#374151">Custom Metrics</text>
    <text x="550" y="158" text-anchor="middle" font-size="10" fill="#374151">Business Logic</text>
    <text x="550" y="171" text-anchor="middle" font-size="10" fill="#374151">SLI Generation</text>
    
    <!-- Configuration box -->
    <rect x="680" y="110" width="260" height="70" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="690" y="130" font-size="11" font-weight="bold" fill="#4338ca">Configuration &amp; Authentication</text>
    <text x="690" y="145" font-size="10" fill="#4338ca">" TLS mutual authentication</text>
    <text x="690" y="158" font-size="10" fill="#4338ca">" Batching (1000 metrics/batch)</text>
    <text x="690" y="171" font-size="10" fill="#4338ca">" Structured JSON/Protobuf format</text>
    
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Arrow down -->
    <line x1="500" y1="195" x2="500" y2="220" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Regional Ingress Layer -->
    <rect x="30" y="230" width="940" height="120" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="50" y="255" font-size="14" font-weight="bold" fill="#15803d">MULTI-REGION INGRESS LAYER</text>
    
    <!-- Regional components -->
    <rect x="80" y="270" width="220" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="190" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">US-WEST-1</text>
    <text x="190" y="305" text-anchor="middle" font-size="10" fill="#166534">Load Balancer (HAProxy)</text>
    <text x="190" y="318" text-anchor="middle" font-size="10" fill="#166534">Rate Limiting (10K req/s)</text>
    <text x="190" y="331" text-anchor="middle" font-size="10" fill="#166534">Auth Gateway (mTLS)</text>
    
    <rect x="320" y="270" width="220" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="430" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">US-EAST-1</text>
    <text x="430" y="305" text-anchor="middle" font-size="10" fill="#166534">Load Balancer (HAProxy)</text>
    <text x="430" y="318" text-anchor="middle" font-size="10" fill="#166534">Rate Limiting (10K req/s)</text>
    <text x="430" y="331" text-anchor="middle" font-size="10" fill="#166534">Auth Gateway (mTLS)</text>
    
    <rect x="560" y="270" width="220" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="670" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">EU-WEST-1</text>
    <text x="670" y="305" text-anchor="middle" font-size="10" fill="#166534">Load Balancer (HAProxy)</text>
    <text x="670" y="318" text-anchor="middle" font-size="10" fill="#166534">Rate Limiting (10K req/s)</text>
    <text x="670" y="331" text-anchor="middle" font-size="10" fill="#166534">Auth Gateway (mTLS)</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="355" x2="500" y2="380" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Kafka Layer -->
    <rect x="30" y="390" width="940" height="120" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="50" y="415" font-size="14" font-weight="bold" fill="#991b1b">DURABLE MESSAGE QUEUE (Apache Kafka)</text>
    
    <!-- Kafka components -->
    <rect x="80" y="430" width="220" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="190" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">telemetry-raw</text>
    <text x="190" y="465" text-anchor="middle" font-size="10" fill="#991b1b">1000 partitions</text>
    <text x="190" y="478" text-anchor="middle" font-size="10" fill="#991b1b">7-day retention</text>
    <text x="190" y="491" text-anchor="middle" font-size="10" fill="#991b1b">3x replication</text>
    
    <rect x="320" y="430" width="220" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="430" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">Cross-Region Sync</text>
    <text x="430" y="465" text-anchor="middle" font-size="10" fill="#991b1b">MirrorMaker 2.0</text>
    <text x="430" y="478" text-anchor="middle" font-size="10" fill="#991b1b">Active-Active topology</text>
    <text x="430" y="491" text-anchor="middle" font-size="10" fill="#991b1b">Geo-replication</text>
    
    <rect x="560" y="430" width="220" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="670" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">Dead Letter Queue</text>
    <text x="670" y="465" text-anchor="middle" font-size="10" fill="#991b1b">Malformed messages</text>
    <text x="670" y="478" text-anchor="middle" font-size="10" fill="#991b1b">Error handling &amp; retry</text>
    <text x="670" y="491" text-anchor="middle" font-size="10" fill="#991b1b">Replay capability</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="515" x2="500" y2="540" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Processing Layer -->
    <rect x="30" y="550" width="940" height="120" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="6"/>
    <text x="50" y="575" font-size="14" font-weight="bold" fill="#c2410c">STREAM PROCESSING (Auto-scaling Workers)</text>
    
    <!-- Processing components -->
    <rect x="60" y="590" width="160" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="140" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Processor-1</text>
    <text x="140" y="625" text-anchor="middle" font-size="9" fill="#c2410c">Deduplication</text>
    <text x="140" y="636" text-anchor="middle" font-size="9" fill="#c2410c">SLI Compute</text>
    <text x="140" y="647" text-anchor="middle" font-size="9" fill="#c2410c">Rule Engine</text>
    <text x="140" y="658" text-anchor="middle" font-size="9" fill="#c2410c">Validation</text>
    
    <rect x="240" y="590" width="160" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="320" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Processor-2</text>
    <text x="320" y="625" text-anchor="middle" font-size="9" fill="#c2410c">Pre-aggregate</text>
    <text x="320" y="636" text-anchor="middle" font-size="9" fill="#c2410c">Windowing</text>
    <text x="320" y="647" text-anchor="middle" font-size="9" fill="#c2410c">Checkpoints</text>
    <text x="320" y="658" text-anchor="middle" font-size="9" fill="#c2410c">State mgmt</text>
    
    <text x="430" y="625" text-anchor="middle" font-size="24" fill="#c2410c">...</text>
    
    <rect x="500" y="590" width="160" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="580" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Processor-N</text>
    <text x="580" y="625" text-anchor="middle" font-size="9" fill="#c2410c">Auto-scaling</text>
    <text x="580" y="636" text-anchor="middle" font-size="9" fill="#c2410c">Circuit breaker</text>
    <text x="580" y="647" text-anchor="middle" font-size="9" fill="#c2410c">Failover logic</text>
    <text x="580" y="658" text-anchor="middle" font-size="9" fill="#c2410c">Health checks</text>
    
    <!-- Monitoring Worker -->
    <rect x="680" y="590" width="260" height="70" fill="#fef7ff" stroke="#a855f7" stroke-width="2" rx="4"/>
    <text x="810" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">Monitoring Worker</text>
    <text x="810" y="625" text-anchor="middle" font-size="9" fill="#7c3aed">Process latency tracking</text>
    <text x="810" y="636" text-anchor="middle" font-size="9" fill="#7c3aed">Consumer lag monitoring</text>
    <text x="810" y="647" text-anchor="middle" font-size="9" fill="#7c3aed">Error rate computation</text>
    <text x="810" y="658" text-anchor="middle" font-size="9" fill="#7c3aed">SLO compliance check</text>
    
    <!-- Arrows to bottom layers -->
    <line x1="200" y1="670" x2="200" y2="700" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="500" y1="670" x2="500" y2="700" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="800" y1="670" x2="800" y2="700" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Bottom Layer -->
    <!-- Storage -->
    <rect x="50" y="710" width="280" height="70" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" rx="4"/>
    <text x="60" y="730" font-size="12" font-weight="bold" fill="#5b21b6">STORAGE LAYER</text>
    <text x="60" y="745" font-size="10" fill="#6d28d9">Hot: Bigtable/HBase (30 days)</text>
    <text x="60" y="758" font-size="10" fill="#6d28d9">Cold: GCS/S3 (3 years)</text>
    <text x="60" y="771" font-size="10" fill="#6d28d9">Query p95: &lt;200ms (hot), &lt;30s (cold)</text>
    
    <!-- Alerting -->
    <rect x="360" y="710" width="280" height="70" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="370" y="730" font-size="12" font-weight="bold" fill="#047857">ALERTING ENGINE</text>
    <text x="370" y="745" font-size="10" fill="#059669">Rules + Deduplication</text>
    <text x="370" y="758" font-size="10" fill="#059669">PagerDuty + Slack + SMS</text>
    <text x="370" y="771" text-anchor="start" font-size="10" fill="#059669">SLO burn rate triggers</text>
    
    <!-- Observability -->
    <rect x="670" y="710" width="280" height="70" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="4"/>
    <text x="680" y="730" font-size="12" font-weight="bold" fill="#d97706">OBSERVABILITY</text>
    <text x="680" y="745" font-size="10" fill="#f59e0b">Synthetic monitoring tests</text>
    <text x="680" y="758" font-size="10" fill="#f59e0b">Chaos engineering (10% traffic)</text>
    <text x="680" y="771" font-size="10" fill="#f59e0b">End-to-end SLO validation</text>
</svg>