<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="700" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#7c3aed" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        Distributed Logging Pipeline (20TB/day structured logs)
    </text>
    
    <!-- Microservices Layer -->
    <rect x="30" y="70" width="940" height="100" fill="#fef7ff" stroke="#a855f7" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#7e22ce">LOG PRODUCERS (Microservices Fleet)</text>
    
    <!-- Service boxes -->
    <rect x="80" y="110" width="140" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="150" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Service A</text>
    <text x="150" y="140" text-anchor="middle" font-size="9" fill="#7c3aed">FluentD Agent</text>
    <text x="150" y="152" text-anchor="middle" font-size="9" fill="#7c3aed">JSON Structured</text>
    
    <rect x="240" y="110" width="140" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="310" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Service B</text>
    <text x="310" y="140" text-anchor="middle" font-size="9" fill="#7c3aed">FluentD Agent</text>
    <text x="310" y="152" text-anchor="middle" font-size="9" fill="#7c3aed">JSON Structured</text>
    
    <rect x="400" y="110" width="140" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="470" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Service C</text>
    <text x="470" y="140" text-anchor="middle" font-size="9" fill="#7c3aed">FluentD Agent</text>
    <text x="470" y="152" text-anchor="middle" font-size="9" fill="#7c3aed">JSON Structured</text>
    
    <text x="580" y="135" font-size="16" fill="#7c3aed">...</text>
    
    <rect x="640" y="110" width="140" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="710" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Service N</text>
    <text x="710" y="140" text-anchor="middle" font-size="9" fill="#7c3aed">FluentD Agent</text>
    <text x="710" y="152" text-anchor="middle" font-size="9" fill="#7c3aed">JSON Structured</text>
    
    <!-- Configuration box -->
    <rect x="800" y="110" width="140" height="50" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="810" y="125" font-size="10" font-weight="bold" fill="#4338ca">Log Config</text>
    <text x="810" y="138" font-size="9" fill="#4338ca">" 100MB/min max</text>
    <text x="810" y="149" font-size="9" fill="#4338ca">" Sampling: 10%</text>
    <text x="810" y="160" font-size="9" fill="#4338ca">" Buffer: 64MB</text>
    
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Arrow down -->
    <line x1="500" y1="175" x2="500" y2="200" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Regional Ingestion -->
    <rect x="30" y="210" width="940" height="80" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="50" y="235" font-size="14" font-weight="bold" fill="#15803d">REGIONAL INGESTION LAYER</text>
    
    <rect x="80" y="250" width="200" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="180" y="268" text-anchor="middle" font-size="11" fill="#14532d">Schema Validation + Auth</text>
    
    <rect x="300" y="250" width="200" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="400" y="268" text-anchor="middle" font-size="11" fill="#14532d">Multi-tenant Rate Limiting</text>
    
    <rect x="520" y="250" width="200" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="620" y="268" text-anchor="middle" font-size="11" fill="#14532d">Geo Load Balancing</text>
    
    <rect x="740" y="250" width="200" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="840" y="268" text-anchor="middle" font-size="11" fill="#14532d">Circuit Breaker</text>
    
    <!-- Processing Pipeline -->
    <line x1="500" y1="295" x2="500" y2="320" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <rect x="30" y="330" width="940" height="180" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="6"/>
    <text x="50" y="355" font-size="14" font-weight="bold" fill="#c2410c">PARALLEL PROCESSING PIPELINE</text>
    
    <!-- Processing components -->
    <rect x="60" y="370" width="220" height="130" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="170" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">INDEXING WORKERS</text>
    <text x="170" y="410" text-anchor="middle" font-size="10" fill="#c2410c">Parse &amp; Enrich logs</text>
    <text x="170" y="425" text-anchor="middle" font-size="10" fill="#c2410c">Extract metadata</text>
    <text x="170" y="440" text-anchor="middle" font-size="10" fill="#c2410c">Add timestamps</text>
    <text x="170" y="455" text-anchor="middle" font-size="10" fill="#c2410c">Classify severity</text>
    <text x="170" y="470" text-anchor="middle" font-size="10" fill="#c2410c">Full-text indexing</text>
    <text x="170" y="485" text-anchor="middle" font-size="10" fill="#c2410c">Correlation IDs</text>
    
    <rect x="300" y="370" width="220" height="130" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="410" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">STORAGE WORKERS</text>
    <text x="410" y="410" text-anchor="middle" font-size="10" fill="#c2410c">Hot Storage Writer</text>
    <text x="410" y="425" text-anchor="middle" font-size="10" fill="#c2410c">Elasticsearch cluster</text>
    <text x="410" y="440" text-anchor="middle" font-size="10" fill="#c2410c">Cold Storage Writer</text>
    <text x="410" y="455" text-anchor="middle" font-size="10" fill="#c2410c">S3/GCS Parquet</text>
    <text x="410" y="470" text-anchor="middle" font-size="10" fill="#c2410c">Lifecycle policies</text>
    <text x="410" y="485" text-anchor="middle" font-size="10" fill="#c2410c">Compression (80%)</text>
    
    <rect x="540" y="370" width="220" height="130" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="650" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">ANALYTICS WORKERS</text>
    <text x="650" y="410" text-anchor="middle" font-size="10" fill="#c2410c">Aggregation Engine</text>
    <text x="650" y="425" text-anchor="middle" font-size="10" fill="#c2410c">Error rate calculation</text>
    <text x="650" y="440" text-anchor="middle" font-size="10" fill="#c2410c">Log volume metrics</text>
    <text x="650" y="455" text-anchor="middle" font-size="10" fill="#c2410c">Anomaly detection</text>
    <text x="650" y="470" text-anchor="middle" font-size="10" fill="#c2410c">SLI Computation</text>
    <text x="650" y="485" text-anchor="middle" font-size="10" fill="#c2410c">Pattern recognition</text>
    
    <rect x="780" y="370" width="160" height="130" fill="#fef7ff" stroke="#a855f7" stroke-width="2" rx="4"/>
    <text x="860" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">STREAM PROC</text>
    <text x="860" y="410" text-anchor="middle" font-size="9" fill="#7c3aed">Apache Beam</text>
    <text x="860" y="425" text-anchor="middle" font-size="9" fill="#7c3aed">Windowing</text>
    <text x="860" y="440" text-anchor="middle" font-size="9" fill="#7c3aed">Checkpoints</text>
    <text x="860" y="455" text-anchor="middle" font-size="9" fill="#7c3aed">Watermarks</text>
    <text x="860" y="470" text-anchor="middle" font-size="9" fill="#7c3aed">Late data</text>
    <text x="860" y="485" text-anchor="middle" font-size="9" fill="#7c3aed">Auto-scaling</text>
    
    <!-- Arrows to storage -->
    <line x1="170" y1="510" x2="170" y2="535" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="410" y1="510" x2="410" y2="535" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="650" y1="510" x2="650" y2="535" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="860" y1="510" x2="860" y2="535" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Storage Tier -->
    <rect x="50" y="545" width="420" height="80" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" rx="4"/>
    <text x="60" y="565" font-size="12" font-weight="bold" fill="#5b21b6">HOT STORAGE (30 days)</text>
    <text x="60" y="580" font-size="10" fill="#6d28d9">Elasticsearch cluster (SSD-backed)</text>
    <text x="60" y="595" font-size="10" fill="#6d28d9">Query p95: &lt;200ms, p99: &lt;1s</text>
    <text x="60" y="610" font-size="10" fill="#6d28d9">Real-time indexing &amp; search</text>
    <text x="250" y="595" font-size="10" fill="#6d28d9">Auto-scaling based on load</text>
    <text x="250" y="610" font-size="10" fill="#6d28d9">Cross-AZ replication</text>
    
    <rect x="500" y="545" width="420" height="80" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="4"/>
    <text x="510" y="565" font-size="12" font-weight="bold" fill="#d97706">COLD STORAGE (1 year)</text>
    <text x="510" y="580" font-size="10" fill="#f59e0b">Object store (S3/GCS) + BigQuery</text>
    <text x="510" y="595" font-size="10" fill="#f59e0b">Query p95: &lt;30s (batch processing)</text>
    <text x="510" y="610" font-size="10" fill="#f59e0b">80% compression (Parquet format)</text>
    <text x="700" y="595" font-size="10" fill="#f59e0b">Cost: $0.01/GB/month</text>
    <text x="700" y="610" font-size="10" fill="#f59e0b">Analytics-optimized</text>
    
    <!-- Query API -->
    <line x1="500" y1="630" x2="500" y2="655" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <rect x="150" y="665" width="700" height="25" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="500" y="680" text-anchor="middle" font-size="11" font-weight="bold" fill="#047857">QUERY API &amp; OBSERVABILITY LAYER</text>
    <text x="500" y="685" text-anchor="middle" font-size="1" fill="white">.</text>
    
    <!-- Bottom details -->
    <text x="200" y="695" font-size="9" fill="#059669">GraphQL/REST API</text>
    <text x="350" y="695" font-size="9" fill="#059669">Rate Limiting</text>
    <text x="480" y="695" font-size="9" fill="#059669">Multi-tenant Auth</text>
    <text x="600" y="695" font-size="9" fill="#059669">Real-time Dashboards</text>
    <text x="750" y="695" font-size="9" fill="#059669">SLO Monitoring</text>
</svg>