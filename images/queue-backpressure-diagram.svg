<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="700" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#7c2d92" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        Queue-based Decoupling &amp; Backpressure: LinkedIn Content Pipeline
    </text>
    
    <!-- Producer Section -->
    <rect x="30" y="70" width="200" height="300" fill="#fdf4ff" stroke="#c084fc" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#7e22ce">PRODUCERS</text>
    
    <!-- User Posts -->
    <rect x="50" y="110" width="160" height="50" fill="#a855f7" stroke="#7e22ce" stroke-width="2" rx="4"/>
    <text x="130" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">User Posts</text>
    <text x="130" y="145" text-anchor="middle" font-size="9" fill="white">100K posts/min</text>
    
    <!-- Content Updates -->
    <rect x="50" y="170" width="160" height="50" fill="#a855f7" stroke="#7e22ce" stroke-width="2" rx="4"/>
    <text x="130" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Profile Updates</text>
    <text x="130" y="205" text-anchor="middle" font-size="9" fill="white">50K updates/min</text>
    
    <!-- Job Postings -->
    <rect x="50" y="230" width="160" height="50" fill="#a855f7" stroke="#7e22ce" stroke-width="2" rx="4"/>
    <text x="130" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Job Postings</text>
    <text x="130" y="265" text-anchor="middle" font-size="9" fill="white">10K jobs/min</text>
    
    <!-- Company Updates -->
    <rect x="50" y="290" width="160" height="50" fill="#a855f7" stroke="#7e22ce" stroke-width="2" rx="4"/>
    <text x="130" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Company Updates</text>
    <text x="130" y="325" text-anchor="middle" font-size="9" fill="white">20K updates/min</text>
    
    <!-- Kafka Queue Section -->
    <rect x="270" y="70" width="260" height="300" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="6"/>
    <text x="290" y="95" font-size="14" font-weight="bold" fill="#c2410c">KAFKA MESSAGE QUEUE</text>
    
    <!-- Kafka Topics -->
    <rect x="290" y="110" width="220" height="60" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="400" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">content-stream</text>
    <text x="400" y="145" text-anchor="middle" font-size="9" fill="#c2410c">Partitions: 100 | Retention: 7 days</text>
    <text x="400" y="160" text-anchor="middle" font-size="9" fill="#c2410c">Replication: 3x | Throughput: 180K/min</text>
    
    <!-- Queue Buffer Status -->
    <rect x="290" y="180" width="220" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="300" y="200" font-size="11" font-weight="bold" fill="#991b1b">QUEUE STATUS</text>
    <text x="300" y="215" font-size="10" fill="#7f1d1d">Producer Rate: 180K msg/min</text>
    <text x="300" y="230" font-size="10" fill="#7f1d1d">Consumer Rate: 120K msg/min</text>
    <text x="300" y="245" font-size="10" fill="#7f1d1d">Queue Depth: 2.5M messages</text>
    <text x="300" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Ā BACKPRESSURE TRIGGERED</text>
    
    <!-- Backpressure Control -->
    <rect x="290" y="270" width="220" height="90" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="300" y="290" font-size="11" font-weight="bold" fill="#047857">BACKPRESSURE CONTROLS</text>
    <text x="300" y="305" font-size="10" fill="#059669">1. Rate Limiting: 150K msg/min max</text>
    <text x="300" y="320" font-size="10" fill="#059669">2. Client Throttling: 503 responses</text>
    <text x="300" y="335" font-size="10" fill="#059669">3. Auto-scaling: +50 consumer pods</text>
    <text x="300" y="350" font-size="10" fill="#059669">4. Circuit Breaking: Non-critical flows</text>
    
    <!-- Consumer Section -->
    <rect x="570" y="70" width="400" height="300" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
    <text x="590" y="95" font-size="14" font-weight="bold" fill="#0c4a6e">CONSUMERS (Downstream Services)</text>
    
    <!-- Feed Generation -->
    <rect x="590" y="110" width="170" height="70" fill="#0ea5e9" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="675" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Feed Generation</text>
    <text x="675" y="145" text-anchor="middle" font-size="9" fill="white">Processing: 80K/min</text>
    <text x="675" y="160" text-anchor="middle" font-size="9" fill="white">Lag: 2 minutes</text>
    <text x="675" y="175" text-anchor="middle" font-size="9" fill="white">Status: HEALTHY</text>
    
    <!-- Search Indexing -->
    <rect x="780" y="110" width="170" height="70" fill="#dc2626" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="865" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Search Indexing</text>
    <text x="865" y="145" text-anchor="middle" font-size="9" fill="white">Processing: 15K/min</text>
    <text x="865" y="160" text-anchor="middle" font-size="9" fill="white">Lag: 15 minutes</text>
    <text x="865" y="175" text-anchor="middle" font-size="9" fill="white">Status: DEGRADED</text>
    
    <!-- Analytics -->
    <rect x="590" y="190" width="170" height="70" fill="#16a34a" stroke="#15803d" stroke-width="2" rx="4"/>
    <text x="675" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Analytics Engine</text>
    <text x="675" y="225" text-anchor="middle" font-size="9" fill="white">Processing: 25K/min</text>
    <text x="675" y="240" text-anchor="middle" font-size="9" fill="white">Lag: 5 minutes</text>
    <text x="675" y="255" text-anchor="middle" font-size="9" fill="white">Status: HEALTHY</text>
    
    <!-- Notifications -->
    <rect x="780" y="190" width="170" height="70" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="865" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Notifications</text>
    <text x="865" y="225" text-anchor="middle" font-size="9" fill="white">Processing: 60K/min</text>
    <text x="865" y="240" text-anchor="middle" font-size="9" fill="white">Lag: 1 minute</text>
    <text x="865" y="255" text-anchor="middle" font-size="9" fill="white">Status: HEALTHY</text>
    
    <!-- ML Training -->
    <rect x="590" y="270" width="170" height="70" fill="#7c3aed" stroke="#6d28d9" stroke-width="2" rx="4"/>
    <text x="675" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ML Training</text>
    <text x="675" y="305" text-anchor="middle" font-size="9" fill="white">Processing: 10K/min</text>
    <text x="675" y="320" text-anchor="middle" font-size="9" fill="white">Lag: 30 minutes</text>
    <text x="675" y="335" text-anchor="middle" font-size="9" fill="white">Status: HEALTHY</text>
    
    <!-- Content Moderation -->
    <rect x="780" y="270" width="170" height="70" fill="#ec4899" stroke="#db2777" stroke-width="2" rx="4"/>
    <text x="865" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Content Moderation</text>
    <text x="865" y="305" text-anchor="middle" font-size="9" fill="white">Processing: 40K/min</text>
    <text x="865" y="320" text-anchor="middle" font-size="9" fill="white">Lag: 3 minutes</text>
    <text x="865" y="335" text-anchor="middle" font-size="9" fill="white">Status: HEALTHY</text>
    
    <!-- Flow Arrows -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
        <marker id="backpressureArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#dc2626">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Producer to Queue -->
    <line x1="230" y1="135" x2="270" y2="140" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="230" y1="195" x2="270" y2="140" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="230" y1="255" x2="270" y2="140" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="230" y1="315" x2="270" y2="140" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Queue to Consumers -->
    <line x1="530" y1="140" x2="570" y2="145" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="530" y1="140" x2="570" y2="225" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="530" y1="140" x2="570" y2="305" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <line x1="530" y1="140" x2="770" y2="145" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="530" y1="140" x2="770" y2="225" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="530" y1="140" x2="770" y2="305" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Backpressure Feedback -->
    <line x1="270" y1="300" x2="230" y2="300" stroke="#dc2626" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#backpressureArrow)"/>
    <text x="250" y="295" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">BACKPRESSURE</text>
    
    <!-- Failure Impact Analysis -->
    <rect x="50" y="390" width="900" height="140" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="4"/>
    <text x="70" y="415" font-size="14" font-weight="bold" fill="#1e293b">FAILURE SCENARIOS &amp; MITIGATION</text>
    
    <rect x="80" y="430" width="270" height="90" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="90" y="450" font-size="11" font-weight="bold" fill="#991b1b">Without Queues (Synchronous)</text>
    <text x="90" y="465" font-size="9" fill="#7f1d1d">" Search service failure blocks all posts</text>
    <text x="90" y="480" font-size="9" fill="#7f1d1d">" User sees errors immediately</text>
    <text x="90" y="495" font-size="9" fill="#7f1d1d">" Cascading failures to all services</text>
    <text x="90" y="510" font-size="9" fill="#7f1d1d">" Complete platform unavailable</text>
    
    <rect x="370" y="430" width="270" height="90" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="380" y="450" font-size="11" font-weight="bold" fill="#047857">With Kafka Queues</text>
    <text x="380" y="465" font-size="9" fill="#059669">" Posts continue during search failure</text>
    <text x="380" y="480" font-size="9" fill="#059669">" Users unaware of backend issues</text>
    <text x="380" y="495" font-size="9" fill="#059669">" Service isolation maintained</text>
    <text x="380" y="510" font-size="9" fill="#059669">" Feed/notifications still work</text>
    
    <rect x="660" y="430" width="270" height="90" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="670" y="450" font-size="11" font-weight="bold" fill="#1d4ed8">Backpressure Benefits</text>
    <text x="670" y="465" font-size="9" fill="#2563eb">" Prevents queue overflow</text>
    <text x="670" y="480" font-size="9" fill="#2563eb">" Auto-scaling triggers</text>
    <text x="670" y="495" font-size="9" fill="#2563eb">" Graceful degradation</text>
    <text x="670" y="510" font-size="9" fill="#2563eb">" System stability maintained</text>
    
    <!-- Configuration Details -->
    <rect x="50" y="550" width="900" height="120" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="70" y="575" font-size="14" font-weight="bold" fill="#d97706">LINKEDIN KAFKA CONFIGURATION</text>
    
    <rect x="80" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="90" y="610" font-size="10" font-weight="bold" fill="#c2410c">Queue Limits</text>
    <text x="90" y="625" font-size="9" fill="#ea580c">Max Queue Size: 10M msg</text>
    <text x="90" y="640" font-size="9" fill="#ea580c">Retention: 7 days</text>
    <text x="90" y="655" font-size="9" fill="#ea580c">Partitions: 100</text>
    
    <rect x="300" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="310" y="610" font-size="10" font-weight="bold" fill="#c2410c">Backpressure Triggers</text>
    <text x="310" y="625" font-size="9" fill="#ea580c">Queue Depth: &gt; 2M msg</text>
    <text x="310" y="640" font-size="9" fill="#ea580c">Consumer Lag: &gt; 10 min</text>
    <text x="310" y="655" font-size="9" fill="#ea580c">Error Rate: &gt; 5%</text>
    
    <rect x="520" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="530" y="610" font-size="10" font-weight="bold" fill="#c2410c">Auto-scaling</text>
    <text x="530" y="625" font-size="9" fill="#ea580c">Min Consumers: 10</text>
    <text x="530" y="640" font-size="9" fill="#ea580c">Max Consumers: 100</text>
    <text x="530" y="655" font-size="9" fill="#ea580c">Scale Trigger: Lag &gt; 5min</text>
    
    <rect x="740" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="750" y="610" font-size="10" font-weight="bold" fill="#c2410c">Circuit Breakers</text>
    <text x="750" y="625" font-size="9" fill="#ea580c">ML Training: Non-critical</text>
    <text x="750" y="640" font-size="9" fill="#ea580c">Analytics: Delayed OK</text>
    <text x="750" y="655" font-size="9" fill="#ea580c">Feed/Notifications: Priority</text>
</svg>