<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1200" height="800" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="1160" height="35" fill="#1e40af" rx="4"/>
    <text x="600" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
        LinkedIn Distributed Task Queue: 10M tasks/sec - p95 regional &lt; 2s - p99 global &lt; 10s - 99.999% delivery
    </text>
    
    <!-- Producers Section -->
    <rect x="30" y="60" width="160" height="120" fill="#fdf4ff" stroke="#c084fc" stroke-width="2" rx="6"/>
    <text x="50" y="80" font-size="12" font-weight="bold" fill="#7e22ce">Producers</text>
    <text x="50" y="95" font-size="10" fill="#7e22ce">Multi-tenant services</text>
    
    <!-- Individual producer services -->
    <rect x="40" y="105" width="140" height="18" fill="#a855f7" stroke="#7e22ce" stroke-width="1" rx="3"/>
    <text x="110" y="116" text-anchor="middle" font-size="8" fill="white">Image Upload Service</text>
    
    <rect x="40" y="125" width="140" height="18" fill="#a855f7" stroke="#7e22ce" stroke-width="1" rx="3"/>
    <text x="110" y="136" text-anchor="middle" font-size="8" fill="white">Email Service</text>
    
    <rect x="40" y="145" width="140" height="18" fill="#a855f7" stroke="#7e22ce" stroke-width="1" rx="3"/>
    <text x="110" y="156" text-anchor="middle" font-size="8" fill="white">Data Enrichment</text>
    
    <!-- Enqueue Gateway -->
    <rect x="230" y="60" width="200" height="120" fill="#e0f2fe" stroke="#0891b2" stroke-width="2" rx="6"/>
    <text x="250" y="80" font-size="12" font-weight="bold" fill="#0c4a6e">Enqueue gateway</text>
    <text x="250" y="95" font-size="9" fill="#0c4a6e">Auth, schema validate, per-tenant token bucket</text>
    <text x="250" y="110" font-size="9" fill="#0c4a6e">Idempotency key dedupe (Spanner CAS)</text>
    
    <!-- Gateway components -->
    <rect x="240" y="120" width="80" height="25" fill="#06b6d4" stroke="#0891b2" stroke-width="1" rx="3"/>
    <text x="280" y="135" text-anchor="middle" font-size="8" fill="white">Auth Layer</text>
    
    <rect x="330" y="120" width="85" height="25" fill="#06b6d4" stroke="#0891b2" stroke-width="1" rx="3"/>
    <text x="372" y="135" text-anchor="middle" font-size="8" fill="white">Rate Limiter</text>
    
    <rect x="240" y="150" width="175" height="25" fill="#0891b2" stroke="#0e7490" stroke-width="1" rx="3"/>
    <text x="327" y="165" text-anchor="middle" font-size="8" fill="white">Idempotency: hash(input) to Spanner</text>
    
    <!-- Kafka Section -->
    <rect x="470" y="60" width="280" height="120" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="6"/>
    <text x="490" y="80" font-size="12" font-weight="bold" fill="#c2410c">Kafka - partitioned by (tenant, priority)</text>
    <text x="490" y="95" font-size="9" fill="#c2410c">Topics: tasks.p0 (critical), tasks.p1 (standard), tasks.p2 (batch)</text>
    <text x="490" y="110" font-size="9" fill="#c2410c">MirrorMaker2 cross-region, 7-day retention, 3x replication</text>
    
    <!-- Kafka Topics -->
    <rect x="485" y="120" width="75" height="25" fill="#dc2626" stroke="#b91c1c" stroke-width="1" rx="3"/>
    <text x="522" y="135" text-anchor="middle" font-size="8" fill="white">tasks.p0</text>
    
    <rect x="570" y="120" width="75" height="25" fill="#f59e0b" stroke="#d97706" stroke-width="1" rx="3"/>
    <text x="607" y="135" text-anchor="middle" font-size="8" fill="white">tasks.p1</text>
    
    <rect x="655" y="120" width="75" height="25" fill="#22c55e" stroke="#16a34a" stroke-width="1" rx="3"/>
    <text x="692" y="135" text-anchor="middle" font-size="8" fill="white">tasks.p2</text>
    
    <rect x="485" y="150" width="245" height="25" fill="#fed7aa" stroke="#ea580c" stroke-width="1" rx="3"/>
    <text x="607" y="165" text-anchor="middle" font-size="8" fill="#92400e">Partition: hash(tenant_id) for ordering + parallelism</text>
    
    <!-- Scheduler Section -->
    <rect x="790" y="60" width="180" height="120" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2" rx="6"/>
    <text x="810" y="80" font-size="12" font-weight="bold" fill="#1d4ed8">Scheduler + dispatcher</text>
    <text x="810" y="95" font-size="9" fill="#1d4ed8">Delayed / cron, worker-pool routing, lease issuance</text>
    
    <!-- Scheduler components -->
    <rect x="800" y="110" width="80" height="25" fill="#3b82f6" stroke="#1e40af" stroke-width="1" rx="3"/>
    <text x="840" y="125" text-anchor="middle" font-size="8" fill="white">Route Engine</text>
    
    <rect x="885" y="110" width="75" height="25" fill="#3b82f6" stroke="#1e40af" stroke-width="1" rx="3"/>
    <text x="922" y="125" text-anchor="middle" font-size="8" fill="white">Redis Sorted</text>
    
    <rect x="800" y="140" width="160" height="25" fill="#1e40af" stroke="#1e3a8a" stroke-width="1" rx="3"/>
    <text x="880" y="155" text-anchor="middle" font-size="8" fill="white">Task Type to Worker Pool Mapping</text>
    
    <!-- Worker Pools Section -->
    <rect x="30" y="220" width="940" height="180" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="50" y="240" font-size="12" font-weight="bold" fill="#15803d">Worker Pools (Specialized by Resource Type)</text>
    
    <!-- CPU Pool -->
    <rect x="50" y="260" width="160" height="120" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="4"/>
    <text x="130" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">CPU pool</text>
    <text x="130" y="295" text-anchor="middle" font-size="9" fill="#c2410c">Image, transcode</text>
    <text x="130" y="310" text-anchor="middle" font-size="9" fill="#c2410c">HPA 1k-20k</text>
    
    <rect x="60" y="325" width="140" height="15" fill="#f97316" stroke="#ea580c" stroke-width="1" rx="2"/>
    <text x="130" y="335" text-anchor="middle" font-size="7" fill="white">Workers claim with visibility timeout</text>
    
    <rect x="60" y="345" width="140" height="15" fill="#f97316" stroke="#ea580c" stroke-width="1" rx="2"/>
    <text x="130" y="355" text-anchor="middle" font-size="7" fill="white">heartbeat renews lease, ack on completion</text>
    
    <!-- I/O Pool -->
    <rect x="230" y="260" width="160" height="120" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="310" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">I/O pool</text>
    <text x="310" y="295" text-anchor="middle" font-size="9" fill="#166534">Email, webhooks</text>
    <text x="310" y="310" text-anchor="middle" font-size="9" fill="#166534">High-network</text>
    
    <!-- GPU Pool -->
    <rect x="410" y="260" width="160" height="120" fill="#fed7d7" stroke="#dc2626" stroke-width="2" rx="4"/>
    <text x="490" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">GPU pool</text>
    <text x="490" y="295" text-anchor="middle" font-size="9" fill="#991b1b">Inference, ML</text>
    <text x="490" y="310" text-anchor="middle" font-size="9" fill="#991b1b">Specialized nodes</text>
    
    <!-- Memory Pool -->
    <rect x="590" y="260" width="160" height="120" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="670" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Memory pool</text>
    <text x="670" y="295" text-anchor="middle" font-size="9" fill="#6b21a8">Data enrich</text>
    <text x="670" y="310" text-anchor="middle" font-size="9" fill="#6b21a8">High-RAM</text>
    
    <!-- Failure Paths -->
    <rect x="790" y="260" width="160" height="120" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="4"/>
    <text x="870" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Failure path</text>
    <text x="870" y="295" text-anchor="middle" font-size="9" fill="#7f1d1d">Retry with exponential backoff</text>
    <text x="870" y="310" text-anchor="middle" font-size="9" fill="#7f1d1d">After N attempts to DLQ</text>
    
    <rect x="800" y="325" width="140" height="15" fill="#ef4444" stroke="#dc2626" stroke-width="1" rx="2"/>
    <text x="870" y="335" text-anchor="middle" font-size="7" fill="white">1s, 2s, 4s, 8s, 16s, 32s backoff</text>
    
    <rect x="800" y="345" width="140" height="15" fill="#ef4444" stroke="#dc2626" stroke-width="1" rx="2"/>
    <text x="870" y="355" text-anchor="middle" font-size="7" fill="white">Terminal failures to manual replay</text>
    
    <!-- Success Path -->
    <rect x="30" y="430" width="400" height="80" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="6"/>
    <text x="50" y="450" font-size="12" font-weight="bold" fill="#047857">Success path</text>
    <text x="50" y="465" font-size="9" fill="#059669">Commit result, update status</text>
    <text x="50" y="480" font-size="9" fill="#059669">Idempotent CAS on dedupe table</text>
    
    <rect x="50" y="490" width="180" height="15" fill="#10b981" stroke="#047857" stroke-width="1" rx="2"/>
    <text x="140" y="500" text-anchor="middle" font-size="8" fill="white">Task complete to Spanner CAS</text>
    
    <rect x="240" y="490" width="170" height="15" fill="#10b981" stroke="#047857" stroke-width="1" rx="2"/>
    <text x="325" y="500" text-anchor="middle" font-size="8" fill="white">Kafka consumer offset advance</text>
    
    <!-- Dead Letter Queue -->
    <rect x="460" y="430" width="200" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="480" y="450" font-size="12" font-weight="bold" fill="#991b1b">Dead letter queue</text>
    <text x="480" y="465" font-size="9" fill="#7f1d1d">Terminal failures, manual replay</text>
    <text x="480" y="480" font-size="9" fill="#7f1d1d">Alert on depth growth</text>
    
    <rect x="470" y="490" width="180" height="15" fill="#dc2626" stroke="#b91c1c" stroke-width="1" rx="2"/>
    <text x="560" y="500" text-anchor="middle" font-size="8" fill="white">Operator inspection + root cause fix</text>
    
    <!-- State Store -->
    <rect x="690" y="430" width="200" height="80" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="6"/>
    <text x="710" y="450" font-size="12" font-weight="bold" fill="#1d4ed8">State store (Spanner)</text>
    <text x="710" y="465" font-size="9" fill="#2563eb">PENDING, RUNNING, DONE, FAILED</text>
    <text x="710" y="480" font-size="9" fill="#2563eb">Dedupe table, retry counters</text>
    
    <rect x="700" y="490" width="180" height="15" fill="#3b82f6" stroke="#1e40af" stroke-width="1" rx="2"/>
    <text x="790" y="500" text-anchor="middle" font-size="8" fill="white">CAS operations for exactly-once</text>
    
    <!-- Visibility API -->
    <rect x="920" y="430" width="200" height="80" fill="#fefce8" stroke="#eab308" stroke-width="2" rx="6"/>
    <text x="940" y="450" font-size="12" font-weight="bold" fill="#a16207">Visibility API</text>
    <text x="940" y="465" font-size="9" fill="#92400e">Per-task status, tenant dashboards</text>
    
    <rect x="930" y="480" width="180" height="15" fill="#eab308" stroke="#ca8a04" stroke-width="1" rx="2"/>
    <text x="1020" y="490" text-anchor="middle" font-size="8" fill="white">Queue depth, throughput, failure rate, p95</text>
    
    <!-- Control Loops -->
    <rect x="30" y="540" width="1140" height="120" fill="#f8fafc" stroke="#64748b" stroke-width="2" rx="6"/>
    <text x="50" y="560" font-size="12" font-weight="bold" fill="#1e293b">Control loops running in the background</text>
    
    <!-- Auto-scaler -->
    <rect x="50" y="580" width="260" height="70" fill="#e0f2fe" stroke="#0891b2" stroke-width="1" rx="4"/>
    <text x="60" y="600" font-size="10" font-weight="bold" fill="#0e7490">Kafka consumer lag feeds autoscaler</text>
    <text x="60" y="615" font-size="8" fill="#0369a1">Rising lag on tasks.p0 leads to immediate scale-up</text>
    <text x="60" y="630" font-size="8" fill="#0369a1">ML forecast: 15min ahead projection</text>
    <text x="60" y="645" font-size="8" fill="#0369a1">Pre-warm workers before predicted spikes</text>
    
    <!-- DLQ Monitor -->
    <rect x="330" y="580" width="260" height="70" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="340" y="600" font-size="10" font-weight="bold" fill="#991b1b">DLQ depth monitor</text>
    <text x="340" y="615" font-size="8" fill="#7f1d1d">Alert when DLQ grows faster than threshold</text>
    <text x="340" y="630" font-size="8" fill="#7f1d1d">Usually indicates bad deploy or broken downstream</text>
    <text x="340" y="645" font-size="8" fill="#7f1d1d">Growing DLQ equals systemic problem, not noise</text>
    
    <!-- Lease Sweeper -->
    <rect x="610" y="580" width="260" height="70" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="620" y="600" font-size="10" font-weight="bold" fill="#047857">Lease sweeper</text>
    <text x="620" y="615" font-size="8" fill="#059669">Background: finds expired lease tasks</text>
    <text x="620" y="630" font-size="8" fill="#059669">Rare edge case: put back on queue</text>
    <text x="620" y="645" font-size="8" fill="#059669">Handles worker death without natural re-claim</text>
    
    <!-- Circuit Breaker -->
    <rect x="890" y="580" width="260" height="70" fill="#fef7ff" stroke="#a855f7" stroke-width="1" rx="4"/>
    <text x="900" y="600" font-size="10" font-weight="bold" fill="#7e22ce">Downstream dependency monitor</text>
    <text x="900" y="615" font-size="8" fill="#7c3aed">Worker circuit breaker to downstream</text>
    <text x="900" y="630" font-size="8" fill="#7c3aed">Slow downstream leads to fail fast + requeue</text>
    <text x="900" y="645" font-size="8" fill="#7c3aed">Conservative autoscale until recovery</text>
    
    <!-- Flow Arrows -->
    <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#374151">
            <polygon points="0 0, 8 3, 0 6"/>
        </marker>
        <marker id="failureArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#dc2626">
            <polygon points="0 0, 8 3, 0 6"/>
        </marker>
    </defs>
    
    <!-- Producer to Gateway -->
    <line x1="190" y1="120" x2="230" y2="120" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="210" y="115" text-anchor="middle" font-size="7" fill="#374151">enqueue</text>
    
    <!-- Gateway to Kafka -->
    <line x1="430" y1="120" x2="470" y2="120" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="450" y="115" text-anchor="middle" font-size="7" fill="#374151">admit</text>
    
    <!-- Kafka to Scheduler -->
    <line x1="750" y1="120" x2="790" y2="120" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="770" y="115" text-anchor="middle" font-size="7" fill="#374151">consume</text>
    
    <!-- Scheduler to Worker Pools -->
    <line x1="860" y1="180" x2="130" y2="250" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="870" y1="180" x2="310" y2="250" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="880" y1="180" x2="490" y2="250" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="890" y1="180" x2="670" y2="250" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Worker Pools to Success/Failure -->
    <line x1="130" y1="380" x2="200" y2="425" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="310" y1="380" x2="280" y2="425" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Failure path -->
    <line x1="490" y1="380" x2="560" y2="425" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    <line x1="670" y1="380" x2="630" y2="425" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    
    <!-- Key Design Principles -->
    <rect x="30" y="690" width="1140" height="80" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="50" y="710" font-size="12" font-weight="bold" fill="#d97706">Why the flow is designed this way</text>
    <text x="50" y="730" font-size="10" fill="#ea580c">Three Core Questions: (a) Once accepted, is it durable? Kafka replication before ACK</text>
    <text x="50" y="745" font-size="10" fill="#ea580c">(b) Worker dies mid-task? Leases + heartbeats + CAS completion (c) Prevent duplicate effects? Idempotency key + dedupe table + CAS</text>
    <text x="50" y="760" font-size="10" fill="#ea580c">Staff-level insight: Priority topics, pool specialization, predictive autoscale, DLQ are optimizations. The three mechanisms above are load-bearing.</text>
</svg>