<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="700" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#9333ea" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        AI-Powered Anomaly Detection (Real-time ML Platform)
    </text>
    
    <!-- Data Ingestion Layer -->
    <rect x="30" y="70" width="940" height="100" fill="#faf5ff" stroke="#a855f7" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#7e22ce">DATA INGESTION LAYER (Multi-source Telemetry)</text>
    
    <!-- Data sources -->
    <rect x="70" y="110" width="130" height="50" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="135" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#581c87">Metrics</text>
    <text x="135" y="142" text-anchor="middle" font-size="8" fill="#7c3aed">Prometheus/Grafana</text>
    <text x="135" y="153" text-anchor="middle" font-size="8" fill="#7c3aed">100K series/sec</text>
    
    <rect x="220" y="110" width="130" height="50" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="285" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#581c87">Logs</text>
    <text x="285" y="142" text-anchor="middle" font-size="8" fill="#7c3aed">Elasticsearch</text>
    <text x="285" y="153" text-anchor="middle" font-size="8" fill="#7c3aed">1TB/day</text>
    
    <rect x="370" y="110" width="130" height="50" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="435" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#581c87">Traces</text>
    <text x="435" y="142" text-anchor="middle" font-size="8" fill="#7c3aed">Jaeger/Zipkin</text>
    <text x="435" y="153" text-anchor="middle" font-size="8" fill="#7c3aed">10M spans/min</text>
    
    <rect x="520" y="110" width="130" height="50" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="585" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#581c87">Events</text>
    <text x="585" y="142" text-anchor="middle" font-size="8" fill="#7c3aed">Application events</text>
    <text x="585" y="153" text-anchor="middle" font-size="8" fill="#7c3aed">50K events/min</text>
    
    <rect x="670" y="110" width="130" height="50" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="735" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#581c87">Business KPIs</text>
    <text x="735" y="142" text-anchor="middle" font-size="8" fill="#7c3aed">Revenue, DAU</text>
    <text x="735" y="153" text-anchor="middle" font-size="8" fill="#7c3aed">Real-time feeds</text>
    
    <rect x="820" y="110" width="120" height="50" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="880" y="128" text-anchor="middle" font-size="9" font-weight="bold" fill="#4338ca">Stream Processor</text>
    <text x="880" y="142" text-anchor="middle" font-size="7" fill="#4338ca">Apache Kafka</text>
    <text x="880" y="153" text-anchor="middle" font-size="7" fill="#4338ca">Apache Beam</text>
    
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Arrow down -->
    <line x1="500" y1="175" x2="500" y2="200" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Feature Engineering Layer -->
    <rect x="30" y="210" width="940" height="120" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="6"/>
    <text x="50" y="235" font-size="14" font-weight="bold" fill="#c2410c">FEATURE ENGINEERING PIPELINE</text>
    
    <!-- Feature engineering components -->
    <rect x="60" y="250" width="170" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="145" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Time Series</text>
    <text x="145" y="285" text-anchor="middle" font-size="9" fill="#c2410c">Rolling statistics</text>
    <text x="145" y="298" text-anchor="middle" font-size="9" fill="#c2410c">Seasonal decomp.</text>
    <text x="145" y="311" text-anchor="middle" font-size="9" fill="#c2410c">Trend analysis</text>
    
    <rect x="250" y="250" width="170" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="335" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Statistical Features</text>
    <text x="335" y="285" text-anchor="middle" font-size="9" fill="#c2410c">Z-scores</text>
    <text x="335" y="298" text-anchor="middle" font-size="9" fill="#c2410c">Percentiles</text>
    <text x="335" y="311" text-anchor="middle" font-size="9" fill="#c2410c">Distributions</text>
    
    <rect x="440" y="250" width="170" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="525" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Graph Features</text>
    <text x="525" y="285" text-anchor="middle" font-size="9" fill="#c2410c">Service topology</text>
    <text x="525" y="298" text-anchor="middle" font-size="9" fill="#c2410c">Dependency graphs</text>
    <text x="525" y="311" text-anchor="middle" font-size="9" fill="#c2410c">Network metrics</text>
    
    <rect x="630" y="250" width="170" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="715" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Text Features</text>
    <text x="715" y="285" text-anchor="middle" font-size="9" fill="#c2410c">Log embeddings</text>
    <text x="715" y="298" text-anchor="middle" font-size="9" fill="#c2410c">Error patterns</text>
    <text x="715" y="311" text-anchor="middle" font-size="9" fill="#c2410c">NLP processing</text>
    
    <rect x="820" y="250" width="120" height="70" fill="#fef7ff" stroke="#a855f7" stroke-width="1" rx="4"/>
    <text x="880" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#7e22ce">Feature Store</text>
    <text x="880" y="285" text-anchor="middle" font-size="8" fill="#7c3aed">Online features</text>
    <text x="880" y="298" text-anchor="middle" font-size="8" fill="#7c3aed">Offline training</text>
    <text x="880" y="311" text-anchor="middle" font-size="8" fill="#7c3aed">Feast/Tecton</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="335" x2="500" y2="360" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- ML Models Layer -->
    <rect x="30" y="370" width="940" height="120" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
    <text x="50" y="395" font-size="14" font-weight="bold" fill="#0c4a6e">ML DETECTION MODELS (Ensemble Approach)</text>
    
    <!-- ML model components -->
    <rect x="60" y="410" width="150" height="70" fill="#bae6fd" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="135" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c4a6e">Isolation Forest</text>
    <text x="135" y="445" text-anchor="middle" font-size="9" fill="#0369a1">Unsupervised</text>
    <text x="135" y="456" text-anchor="middle" font-size="9" fill="#0369a1">Outlier detection</text>
    <text x="135" y="467" text-anchor="middle" font-size="9" fill="#0369a1">High-dim data</text>
    
    <rect x="230" y="410" width="150" height="70" fill="#bae6fd" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="305" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c4a6e">LSTM Autoencoder</text>
    <text x="305" y="445" text-anchor="middle" font-size="9" fill="#0369a1">Time series</text>
    <text x="305" y="456" text-anchor="middle" font-size="9" fill="#0369a1">Reconstruction err.</text>
    <text x="305" y="467" text-anchor="middle" font-size="9" fill="#0369a1">Seq. patterns</text>
    
    <rect x="400" y="410" width="150" height="70" fill="#bae6fd" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="475" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c4a6e">VAE</text>
    <text x="475" y="445" text-anchor="middle" font-size="9" fill="#0369a1">Variational AE</text>
    <text x="475" y="456" text-anchor="middle" font-size="9" fill="#0369a1">Latent space</text>
    <text x="475" y="467" text-anchor="middle" font-size="9" fill="#0369a1">Gen. modeling</text>
    
    <rect x="570" y="410" width="150" height="70" fill="#bae6fd" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="645" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c4a6e">One-Class SVM</text>
    <text x="645" y="445" text-anchor="middle" font-size="9" fill="#0369a1">Boundary learn.</text>
    <text x="645" y="456" text-anchor="middle" font-size="9" fill="#0369a1">Normal behavior</text>
    <text x="645" y="467" text-anchor="middle" font-size="9" fill="#0369a1">Non-linear sep.</text>
    
    <rect x="740" y="410" width="150" height="70" fill="#bae6fd" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="815" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c4a6e">Transformer</text>
    <text x="815" y="445" text-anchor="middle" font-size="9" fill="#0369a1">Attention-based</text>
    <text x="815" y="456" text-anchor="middle" font-size="9" fill="#0369a1">Multi-modal</text>
    <text x="815" y="467" text-anchor="middle" font-size="9" fill="#0369a1">Context aware</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="495" x2="500" y2="520" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Decision & Response Layer -->
    <rect x="30" y="530" width="940" height="120" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="50" y="555" font-size="14" font-weight="bold" fill="#15803d">DECISION ENGINE &amp; AUTOMATED RESPONSE</text>
    
    <!-- Decision components -->
    <rect x="60" y="570" width="150" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="135" y="590" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Ensemble Voting</text>
    <text x="135" y="605" text-anchor="middle" font-size="9" fill="#166534">Model consensus</text>
    <text x="135" y="616" text-anchor="middle" font-size="9" fill="#166534">Confidence scores</text>
    <text x="135" y="627" text-anchor="middle" font-size="9" fill="#166534">Weighted average</text>
    
    <rect x="230" y="570" width="150" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="305" y="590" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Context Engine</text>
    <text x="305" y="605" text-anchor="middle" font-size="9" fill="#166534">Historical patterns</text>
    <text x="305" y="616" text-anchor="middle" font-size="9" fill="#166534">Business context</text>
    <text x="305" y="627" text-anchor="middle" font-size="9" fill="#166534">Impact assessment</text>
    
    <rect x="400" y="570" width="150" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="475" y="590" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Alert Manager</text>
    <text x="475" y="605" text-anchor="middle" font-size="9" fill="#166534">Severity routing</text>
    <text x="475" y="616" text-anchor="middle" font-size="9" fill="#166534">Deduplication</text>
    <text x="475" y="627" text-anchor="middle" font-size="9" fill="#166534">Escalation rules</text>
    
    <rect x="570" y="570" width="150" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="645" y="590" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Auto-remediation</text>
    <text x="645" y="605" text-anchor="middle" font-size="9" fill="#166534">Playbook engine</text>
    <text x="645" y="616" text-anchor="middle" font-size="9" fill="#166534">Safe actions</text>
    <text x="645" y="627" text-anchor="middle" font-size="9" fill="#166534">Human-in-loop</text>
    
    <rect x="740" y="570" width="150" height="70" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="815" y="590" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Feedback Loop</text>
    <text x="815" y="605" text-anchor="middle" font-size="9" fill="#166534">False pos. learn.</text>
    <text x="815" y="616" text-anchor="middle" font-size="9" fill="#166534">Model retraining</text>
    <text x="815" y="627" text-anchor="middle" font-size="9" fill="#166534">Continuous learn.</text>
    
    <!-- Bottom SLO -->
    <rect x="200" y="660" width="600" height="30" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="500" y="680" text-anchor="middle" font-size="11" font-weight="bold" fill="#047857">
        SLO: Detection latency &lt; 60s, False positive rate &lt; 2%, Coverage 99.5%
    </text>
</svg>