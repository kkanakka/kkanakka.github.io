<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="700" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#dc2626" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        Circuit Breakers &amp; Bulkheads: LinkedIn Service Protection
    </text>
    
    <!-- Circuit Breaker Section -->
    <rect x="30" y="70" width="450" height="300" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#991b1b">CIRCUIT BREAKER PATTERN</text>
    
    <!-- Profile Service -->
    <rect x="60" y="110" width="140" height="80" fill="#3b82f6" stroke="#1e40af" stroke-width="2" rx="4"/>
    <text x="130" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Profile Service</text>
    <text x="130" y="150" text-anchor="middle" font-size="10" fill="white">LinkedIn App</text>
    <text x="130" y="165" text-anchor="middle" font-size="10" fill="white">Circuit Breaker</text>
    <text x="130" y="180" text-anchor="middle" font-size="10" fill="white">Enabled</text>
    
    <!-- Circuit Breaker States -->
    <rect x="230" y="110" width="60" height="25" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="260" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="white">CLOSED</text>
    
    <rect x="230" y="140" width="60" height="25" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="260" y="157" text-anchor="middle" font-size="9" font-weight="bold" fill="white">HALF-OPEN</text>
    
    <rect x="230" y="170" width="60" height="25" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="4"/>
    <text x="260" y="187" text-anchor="middle" font-size="9" font-weight="bold" fill="white">OPEN</text>
    
    <!-- Espresso Database -->
    <rect x="320" y="110" width="140" height="80" fill="#7c3aed" stroke="#6d28d9" stroke-width="2" rx="4"/>
    <text x="390" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Espresso DB</text>
    <text x="390" y="150" text-anchor="middle" font-size="10" fill="white">Member Profiles</text>
    <text x="390" y="165" text-anchor="middle" font-size="10" fill="white">Error Rate: 8%</text>
    <text x="390" y="180" text-anchor="middle" font-size="10" fill="white">Latency: 2s</text>
    
    <!-- Arrow and circuit breaker logic -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
        <marker id="blockedArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#dc2626">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <line x1="200" y1="150" x2="310" y2="150" stroke="#dc2626" stroke-width="4" stroke-dasharray="5,5"/>
    <text x="255" y="145" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">BLOCKED</text>
    
    <!-- Circuit Breaker Decision Logic -->
    <rect x="60" y="210" width="400" height="120" fill="#fff7ed" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="70" y="230" font-size="11" font-weight="bold" fill="#c2410c">CIRCUIT BREAKER DECISION LOGIC</text>
    
    <text x="70" y="250" font-size="10" fill="#ea580c">1. Monitor: Error rate &gt; 5% OR Latency &gt; 1s for 10+ requests</text>
    <text x="70" y="265" font-size="10" fill="#ea580c">2. Open Circuit: Stop all calls to Espresso for 30 seconds</text>
    <text x="70" y="280" font-size="10" fill="#ea580c">3. Fallback: Return cached profile data or default response</text>
    <text x="70" y="295" font-size="10" fill="#ea580c">4. Half-Open: Allow 1 test request after timeout</text>
    <text x="70" y="310" font-size="10" fill="#ea580c">5. Close/Open: Success � Close circuit, Failure � Keep open</text>
    
    <!-- Bulkhead Section -->
    <rect x="520" y="70" width="450" height="300" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
    <text x="540" y="95" font-size="14" font-weight="bold" fill="#0c4a6e">BULKHEAD PATTERN (Resource Isolation)</text>
    
    <!-- LinkedIn Application Server -->
    <rect x="550" y="110" width="390" height="220" fill="#e0f2fe" stroke="#0891b2" stroke-width="2" rx="4"/>
    <text x="560" y="130" font-size="12" font-weight="bold" fill="#0e7490">LinkedIn Application Server</text>
    
    <!-- Separate Resource Pools -->
    <rect x="570" y="140" width="100" height="80" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="620" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Profile Pool</text>
    <text x="620" y="175" text-anchor="middle" font-size="9" fill="white">Thread Pool: 50</text>
    <text x="620" y="190" text-anchor="middle" font-size="9" fill="white">DB Conn: 20</text>
    <text x="620" y="205" text-anchor="middle" font-size="9" fill="white">CPU: 25%</text>
    
    <rect x="690" y="140" width="100" height="80" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="740" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Feed Pool</text>
    <text x="740" y="175" text-anchor="middle" font-size="9" fill="white">Thread Pool: 100</text>
    <text x="740" y="190" text-anchor="middle" font-size="9" fill="white">DB Conn: 40</text>
    <text x="740" y="205" text-anchor="middle" font-size="9" fill="white">CPU: 40%</text>
    
    <rect x="810" y="140" width="100" height="80" fill="#dc2626" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="860" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Messaging Pool</text>
    <text x="860" y="175" text-anchor="middle" font-size="9" fill="white">Thread Pool: 75</text>
    <text x="860" y="190" text-anchor="middle" font-size="9" fill="white">DB Conn: 30</text>
    <text x="860" y="205" text-anchor="middle" font-size="9" fill="white">CPU: 35%</text>
    
    <!-- Failure Scenario -->
    <rect x="570" y="240" width="340" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="580" y="260" font-size="11" font-weight="bold" fill="#991b1b">FAILURE SCENARIO: Messaging Overload</text>
    <text x="580" y="275" font-size="10" fill="#7f1d1d">" Messaging pool saturated (spam attack)</text>
    <text x="580" y="290" font-size="10" fill="#7f1d1d">" Profile and Feed pools remain healthy</text>
    <text x="580" y="305" font-size="10" fill="#7f1d1d">" 66% of LinkedIn functionality preserved</text>
    
    <!-- User Experience Impact -->
    <rect x="50" y="390" width="900" height="140" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="4"/>
    <text x="70" y="415" font-size="14" font-weight="bold" fill="#1e293b">USER EXPERIENCE DURING FAILURES</text>
    
    <rect x="80" y="430" width="270" height="90" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="90" y="450" font-size="11" font-weight="bold" fill="#991b1b">Without Circuit Breakers</text>
    <text x="90" y="465" font-size="9" fill="#7f1d1d">" All requests timeout (30s each)</text>
    <text x="90" y="480" font-size="9" fill="#7f1d1d">" Resource exhaustion cascades</text>
    <text x="90" y="495" font-size="9" fill="#7f1d1d">" Complete LinkedIn outage</text>
    <text x="90" y="510" font-size="9" fill="#7f1d1d">" 900M users affected</text>
    
    <rect x="370" y="430" width="270" height="90" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="380" y="450" font-size="11" font-weight="bold" fill="#047857">With Circuit Breakers</text>
    <text x="380" y="465" font-size="9" fill="#059669">" Fast failure (100ms response)</text>
    <text x="380" y="480" font-size="9" fill="#059669">" Cached data served</text>
    <text x="380" y="495" font-size="9" fill="#059669">" Graceful degradation</text>
    <text x="380" y="510" font-size="9" fill="#059669">" Core functionality preserved</text>
    
    <rect x="660" y="430" width="270" height="90" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="670" y="450" font-size="11" font-weight="bold" fill="#1d4ed8">With Bulkheads</text>
    <text x="670" y="465" font-size="9" fill="#2563eb">" Service isolation maintained</text>
    <text x="670" y="480" font-size="9" fill="#2563eb">" Profile/Feed still work</text>
    <text x="670" y="495" font-size="9" fill="#2563eb">" Only messaging affected</text>
    <text x="670" y="510" font-size="9" fill="#2563eb">" Partial functionality loss</text>
    
    <!-- Metrics and Thresholds -->
    <rect x="50" y="550" width="900" height="120" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="70" y="575" font-size="14" font-weight="bold" fill="#d97706">LINKEDIN CIRCUIT BREAKER CONFIGURATION</text>
    
    <rect x="80" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="90" y="610" font-size="10" font-weight="bold" fill="#c2410c">Failure Threshold</text>
    <text x="90" y="625" font-size="9" fill="#ea580c">Error Rate: &gt; 5%</text>
    <text x="90" y="640" font-size="9" fill="#ea580c">Latency: &gt; 1000ms p95</text>
    <text x="90" y="655" font-size="9" fill="#ea580c">Min Requests: 10</text>
    
    <rect x="300" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="310" y="610" font-size="10" font-weight="bold" fill="#c2410c">Recovery Settings</text>
    <text x="310" y="625" font-size="9" fill="#ea580c">Timeout: 30 seconds</text>
    <text x="310" y="640" font-size="9" fill="#ea580c">Test Requests: 1</text>
    <text x="310" y="655" font-size="9" fill="#ea580c">Success Threshold: 95%</text>
    
    <rect x="520" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="530" y="610" font-size="10" font-weight="bold" fill="#c2410c">Fallback Strategy</text>
    <text x="530" y="625" font-size="9" fill="#ea580c">Cache: Redis (5min TTL)</text>
    <text x="530" y="640" font-size="9" fill="#ea580c">Default: Empty response</text>
    <text x="530" y="655" font-size="9" fill="#ea580c">Retry: Exponential backoff</text>
    
    <rect x="740" y="590" width="200" height="70" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="750" y="610" font-size="10" font-weight="bold" fill="#c2410c">Bulkhead Limits</text>
    <text x="750" y="625" font-size="9" fill="#ea580c">Max Threads: 225 total</text>
    <text x="750" y="640" font-size="9" fill="#ea580c">Max Connections: 90</text>
    <text x="750" y="655" font-size="9" fill="#ea580c">CPU Quota: 100%</text>
</svg>