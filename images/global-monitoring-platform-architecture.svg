    <text x="125" y="627" text-anchor="middle" font-size="8" fill="#991b1b">Auto-insights</text>
    
    <rect x="210" y="570" width="130" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="275" y="590" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">Alerting</text>
    <text x="275" y="605" text-anchor="middle" font-size="8" fill="#991b1b">Smart routing</text>
    <text x="275" y="616" text-anchor="middle" font-size="8" fill="#991b1b">Deduplication</text>
    <text x="275" y="627" text-anchor="middle" font-size="8" fill="#991b1b">Escalation</text>
    
    <rect x="360" y="570" width="130" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="425" y="590" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">Dashboarding</text>
    <text x="425" y="605" text-anchor="middle" font-size="8" fill="#991b1b">Auto-gen views</text>
    <text x="425" y="616" text-anchor="middle" font-size="8" fill="#991b1b">Custom widgets</text>
    <text x="425" y="627" text-anchor="middle" font-size="8" fill="#991b1b">Real-time</text>
    
    <rect x="510" y="570" width="130" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="575" y="590" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">SLO Engine</text>
    <text x="575" y="605" text-anchor="middle" font-size="8" fill="#991b1b">Error budgets</text>
    <text x="575" y="616" text-anchor="middle" font-size="8" fill="#991b1b">Burn rate calc.</text>
    <text x="575" y="627" text-anchor="middle" font-size="8" fill="#991b1b">Compliance</text>
    
    <rect x="660" y="570" width="130" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="725" y="590" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">Cost Analytics</text>
    <text x="725" y="605" text-anchor="middle" font-size="8" fill="#991b1b">Usage tracking</text>
    <text x="725" y="616" text-anchor="middle" font-size="8" fill="#991b1b">Optimization</text>
