    <text x="410" y="153" text-anchor="middle" font-size="8" fill="#1d4ed8">7TB/day</text>
    
    <rect x="490" y="110" width="120" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="4"/>
