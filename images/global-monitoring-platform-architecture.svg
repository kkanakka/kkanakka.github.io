    <text x="875" y="590" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97706">API Gateway</text>
    <text x="875" y="605" text-anchor="middle" font-size="8" fill="#f59e0b">GraphQL/REST</text>
    <text x="875" y="616" text-anchor="middle" font-size="8" fill="#f59e0b">Rate limiting</text>
    <text x="875" y="627" text-anchor="middle" font-size="8" fill="#f59e0b">Multi-tenant</text>
    
    <!-- Bottom SLO -->
