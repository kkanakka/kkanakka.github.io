    <text x="130" y="142" text-anchor="middle" font-size="8" fill="#1d4ed8">50 PoPs</text>
    <text x="130" y="153" text-anchor="middle" font-size="8" fill="#1d4ed8">10TB/day</text>
    
    <rect x="210" y="110" width="120" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="4"/>
