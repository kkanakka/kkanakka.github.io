<svg width="1000" height="700" xmlns="http://www.w3.thinking/2000/svg">
    <!-- Background -->
    <rect width="1000" height="700" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#059669" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        Graceful Degradation &amp; Fallbacks: LinkedIn Feed Service
    </text>
    
    <!-- User Request -->
    <rect x="30" y="70" width="150" height="60" fill="#3b82f6" stroke="#1e40af" stroke-width="2" rx="4"/>
    <text x="105" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="white">User Request</text>
    <text x="105" y="110" text-anchor="middle" font-size="10" fill="white">LinkedIn Feed</text>
    <text x="105" y="125" text-anchor="middle" font-size="10" fill="white">900M Users</text>
    
    <!-- Fallback Layers -->
    <rect x="220" y="70" width="730" height="560" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="240" y="95" font-size="14" font-weight="bold" fill="#15803d">GRACEFUL DEGRADATION LAYERS</text>
    
    <!-- Layer 1: Full Personalization -->
    <rect x="250" y="110" width="670" height="80" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="270" y="130" font-size="12" font-weight="bold" fill="white">LAYER 1: FULL PERSONALIZATION (Best Experience)</text>
    
    <rect x="270" y="145" width="150" height="35" fill="#bbf7d0" stroke="#16a34a" stroke-width="1" rx="4"/>
    <text x="345" y="165" text-anchor="middle" font-size="9" fill="#14532d">ML Recommendations</text>
    
    <rect x="440" y="145" width="150" height="35" fill="#bbf7d0" stroke="#16a34a" stroke-width="1" rx="4"/>
    <text x="515" y="165" text-anchor="middle" font-size="9" fill="#14532d">Interest Graph</text>
    
    <rect x="610" y="145" width="150" height="35" fill="#bbf7d0" stroke="#16a34a" stroke-width="1" rx="4"/>
    <text x="685" y="165" text-anchor="middle" font-size="9" fill="#14532d">Real-time Scoring</text>
    
    <rect x="780" y="145" width="120" height="35" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="840" y="165" text-anchor="middle" font-size="9" fill="#4338ca">Latency: 200ms</text>
    
    <!-- Layer 2: Basic Personalization -->
    <rect x="250" y="200" width="670" height="80" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="270" y="220" font-size="12" font-weight="bold" fill="white">LAYER 2: BASIC PERSONALIZATION (ML Service Down)</text>
    
    <rect x="270" y="235" width="150" height="35" fill="#fed7aa" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="345" y="255" text-anchor="middle" font-size="9" fill="#92400e">Cached Preferences</text>
    
    <rect x="440" y="235" width="150" height="35" fill="#fed7aa" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="515" y="255" text-anchor="middle" font-size="9" fill="#92400e">Connection Posts</text>
    
    <rect x="610" y="235" width="150" height="35" fill="#fed7aa" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="685" y="255" text-anchor="middle" font-size="9" fill="#92400e">Simple Filtering</text>
    
    <rect x="780" y="235" width="120" height="35" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="840" y="255" text-anchor="middle" font-size="9" fill="#4338ca">Latency: 150ms</text>
    
    <!-- Layer 3: Chronological Feed -->
    <rect x="250" y="290" width="670" height="80" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="4"/>
    <text x="270" y="310" font-size="12" font-weight="bold" fill="white">LAYER 3: CHRONOLOGICAL FEED (Personalization Down)</text>
    
    <rect x="270" y="325" width="150" height="35" fill="#fca5a5" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="345" y="345" text-anchor="middle" font-size="9" fill="#7f1d1d">Time-ordered Posts</text>
    
    <rect x="440" y="325" width="150" height="35" fill="#fca5a5" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="515" y="345" text-anchor="middle" font-size="9" fill="#7f1d1d">Direct Connections</text>
    
    <rect x="610" y="325" width="150" height="35" fill="#fca5a5" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="685" y="345" text-anchor="middle" font-size="9" fill="#7f1d1d">Basic Deduplication</text>
    
    <rect x="780" y="325" width="120" height="35" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="840" y="345" text-anchor="middle" font-size="9" fill="#4338ca">Latency: 100ms</text>
    
    <!-- Layer 4: Trending Content -->
    <rect x="250" y="380" width="670" height="80" fill="#7c3aed" stroke="#6d28d9" stroke-width="2" rx="4"/>
    <text x="270" y="400" font-size="12" font-weight="bold" fill="white">LAYER 4: TRENDING CONTENT (Social Graph Down)</text>
    
    <rect x="270" y="415" width="150" height="35" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="1" rx="4"/>
    <text x="345" y="435" text-anchor="middle" font-size="9" fill="#581c87">Popular Posts</text>
    
    <rect x="440" y="415" width="150" height="35" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="1" rx="4"/>
    <text x="515" y="435" text-anchor="middle" font-size="9" fill="#581c87">Industry News</text>
    
    <rect x="610" y="415" width="150" height="35" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="1" rx="4"/>
    <text x="685" y="435" text-anchor="middle" font-size="9" fill="#581c87">Curated Content</text>
    
    <rect x="780" y="415" width="120" height="35" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="840" y="435" text-anchor="middle" font-size="9" fill="#4338ca">Latency: 50ms</text>
    
    <!-- Layer 5: Static Content -->
    <rect x="250" y="470" width="670" height="80" fill="#64748b" stroke="#475569" stroke-width="2" rx="4"/>
    <text x="270" y="490" font-size="12" font-weight="bold" fill="white">LAYER 5: STATIC CONTENT (Content Service Down)</text>
    
    <rect x="270" y="505" width="150" height="35" fill="#cbd5e1" stroke="#64748b" stroke-width="1" rx="4"/>
    <text x="345" y="525" text-anchor="middle" font-size="9" fill="#1e293b">Cached Articles</text>
    
    <rect x="440" y="505" width="150" height="35" fill="#cbd5e1" stroke="#64748b" stroke-width="1" rx="4"/>
    <text x="515" y="525" text-anchor="middle" font-size="9" fill="#1e293b">LinkedIn News</text>
    
    <rect x="610" y="505" width="150" height="35" fill="#cbd5e1" stroke="#64748b" stroke-width="1" rx="4"/>
    <text x="685" y="525" text-anchor="middle" font-size="9" fill="#1e293b">Educational Content</text>
    
    <rect x="780" y="505" width="120" height="35" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="840" y="525" text-anchor="middle" font-size="9" fill="#4338ca">Latency: 10ms</text>
    
    <!-- Layer 6: Minimal Response -->
    <rect x="250" y="560" width="670" height="60" fill="#1f2937" stroke="#111827" stroke-width="2" rx="4"/>
    <text x="270" y="580" font-size="12" font-weight="bold" fill="white">LAYER 6: MINIMAL RESPONSE (Complete Fallback)</text>
    
    <rect x="270" y="595" width="200" height="20" fill="#6b7280" stroke="#4b5563" stroke-width="1" rx="4"/>
    <text x="370" y="607" text-anchor="middle" font-size="9" fill="white">"Feed temporarily unavailable"</text>
    
    <rect x="490" y="595" width="200" height="20" fill="#6b7280" stroke="#4b5563" stroke-width="1" rx="4"/>
    <text x="590" y="607" text-anchor="middle" font-size="9" fill="white">Basic navigation still works</text>
    
    <rect x="710" y="595" width="190" height="20" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="805" y="607" text-anchor="middle" font-size="9" fill="#4338ca">Latency: 5ms</text>
    
    <!-- Flow Arrows -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
        <marker id="failureArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#dc2626">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Request flow -->
    <line x1="180" y1="100" x2="220" y2="150" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Failure cascades -->
    <line x1="200" y1="170" x2="200" y2="200" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    <text x="205" y="185" font-size="8" fill="#dc2626">ML FAILS</text>
    
    <line x1="200" y1="260" x2="200" y2="290" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    <text x="205" y="275" font-size="8" fill="#dc2626">GRAPH FAILS</text>
    
    <line x1="200" y1="350" x2="200" y2="380" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    <text x="205" y="365" font-size="8" fill="#dc2626">SOCIAL FAILS</text>
    
    <line x1="200" y1="440" x2="200" y2="470" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    <text x="205" y="455" font-size="8" fill="#dc2626">CONTENT FAILS</text>
    
    <line x1="200" y1="530" x2="200" y2="560" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#failureArrow)"/>
    <text x="205" y="545" font-size="8" fill="#dc2626">CACHE FAILS</text>
    
    <!-- Business Impact Analysis -->
    <rect x="50" y="650" width="900" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="4"/>
    <text x="70" y="670" font-size="12" font-weight="bold" fill="#1e293b">USER EXPERIENCE IMPACT</text>
    <text x="300" y="670" font-size="10" fill="#059669">Layer 1-2: Premium experience (95% quality)</text>
    <text x="550" y="670" font-size="10" fill="#f59e0b">Layer 3-4: Good experience (80% quality)</text>
    <text x="750" y="670" font-size="10" fill="#dc2626">Layer 5-6: Basic function (50% quality)</text>
</svg>