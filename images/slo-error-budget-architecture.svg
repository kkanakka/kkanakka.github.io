    <text x="160" y="445" text-anchor="middle" font-size="9" fill="#991b1b">14.4x burn rate</text>
    <text x="160" y="456" text-anchor="middle" font-size="9" fill="#991b1b">1h window</text>
    <text x="160" y="467" text-anchor="middle" font-size="9" fill="#991b1b">Critical severity</text>
    
    <rect x="260" y="410" width="160" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="340" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">Slow Burn Alert</text>
    <text x="340" y="445" text-anchor="middle" font-size="9" fill="#991b1b">6x burn rate</text>
    <text x="340" y="456" text-anchor="middle" font-size="9" fill="#991b1b">6h window</text>
    <text x="340" y="467" text-anchor="middle" font-size="9" fill="#991b1b">Warning severity</text>
    
    <rect x="440" y="410" width="160" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="520" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">Budget Exhausted</text>
    <text x="520" y="445" text-anchor="middle" font-size="9" fill="#991b1b">&lt;2% remaining</text>
    <text x="520" y="456" text-anchor="middle" font-size="9" fill="#991b1b">Auto-freeze deploys</text>
    <text x="520" y="467" text-anchor="middle" font-size="9" fill="#991b1b">Executive notify</text>
    
    <rect x="620" y="410" width="160" height="70" fill="#fca5a5" stroke="#b91c1c" stroke-width="2" rx="4"/>
    <text x="700" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">Recovery Alert</text>
    <text x="700" y="445" text-anchor="middle" font-size="9" fill="#991b1b">SLO restored</text>
    <text x="700" y="456" text-anchor="middle" font-size="9" fill="#991b1b">Budget recovery</text>
    <text x="700" y="467" text-anchor="middle" font-size="9" fill="#991b1b">Resume deploys</text>
    
    <rect x="800" y="410" width="120" height="70" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="860" y="430" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca">Policy Engine</text>
    <text x="860" y="445" text-anchor="middle" font-size="8" fill="#4338ca">Custom rules</text>
    <text x="860" y="456" text-anchor="middle" font-size="8" fill="#4338ca">Team routing</text>
    <text x="860" y="467" text-anchor="middle" font-size="8" fill="#4338ca">Escalation</text>
    
    <!-- Arrow down -->
    <line x1="500" y1="495" x2="500" y2="520" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Dashboard & Actions -->
