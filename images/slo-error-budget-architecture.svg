    <text x="50" y="555" font-size="14" font-weight="bold" fill="#15803d">VISUALIZATION &amp; AUTOMATED ACTIONS</text>
    
    <!-- Dashboard components -->
    <rect x="80" y="570" width="180" height="50" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="170" y="588" text-anchor="middle" font-size="11" fill="#14532d">Real-time Dashboards</text>
    <text x="170" y="603" text-anchor="middle" font-size="9" fill="#166534">Grafana + Alerts</text>
    <text x="170" y="614" text-anchor="middle" font-size="9" fill="#166534">Executive summaries</text>
    
    <rect x="280" y="570" width="180" height="50" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="370" y="588" text-anchor="middle" font-size="11" fill="#14532d">Deployment Gates</text>
    <text x="370" y="603" text-anchor="middle" font-size="9" fill="#166534">CI/CD integration</text>
    <text x="370" y="614" text-anchor="middle" font-size="9" fill="#166534">Auto-freeze policies</text>
    
    <rect x="480" y="570" width="180" height="50" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="4"/>
    <text x="570" y="588" text-anchor="middle" font-size="11" fill="#14532d">Capacity Planning</text>
    <text x="570" y="603" text-anchor="middle" font-size="9" fill="#166534">Resource allocation</text>
    <text x="570" y="614" text-anchor="middle" font-size="9" fill="#166534">Scaling triggers</text>
    
    <rect x="680" y="570" width="240" height="50" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="4"/>
    <text x="800" y="588" text-anchor="middle" font-size="11" fill="#d97706">Historical Analysis &amp; Reporting</text>
    <text x="800" y="603" text-anchor="middle" font-size="9" fill="#f59e0b">Quarterly SLO reviews " Trend analysis " Budget optimization</text>
</svg>