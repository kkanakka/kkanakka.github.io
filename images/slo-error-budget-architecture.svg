<svg width="1000" height="650" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="650" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" rx="4"/>
    
    <!-- Title -->
    <rect x="20" y="10" width="960" height="40" fill="#7c3aed" rx="4"/>
    <text x="500" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
        SLO Error Budget Tracker (Real-time Burn Rate Calculation)
    </text>
    
    <!-- SLI Collection Layer -->
    <rect x="30" y="70" width="940" height="100" fill="#fef7ff" stroke="#a855f7" stroke-width="2" rx="6"/>
    <text x="50" y="95" font-size="14" font-weight="bold" fill="#7e22ce">SLI DATA COLLECTION</text>
    
    <!-- SLI sources -->
    <rect x="70" y="110" width="150" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="145" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Availability</text>
    <text x="145" y="142" text-anchor="middle" font-size="9" fill="#7c3aed">HTTP 200 responses</text>
    <text x="145" y="153" text-anchor="middle" font-size="9" fill="#7c3aed">Service uptime</text>
    
    <rect x="240" y="110" width="150" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="315" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Latency</text>
    <text x="315" y="142" text-anchor="middle" font-size="9" fill="#7c3aed">p95 response time</text>
    <text x="315" y="153" text-anchor="middle" font-size="9" fill="#7c3aed">End-to-end timing</text>
    
    <rect x="410" y="110" width="150" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="485" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Quality</text>
    <text x="485" y="142" text-anchor="middle" font-size="9" fill="#7c3aed">Error rate</text>
    <text x="485" y="153" text-anchor="middle" font-size="9" fill="#7c3aed">Data correctness</text>
    
    <rect x="580" y="110" width="150" height="50" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="4"/>
    <text x="655" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#581c87">Coverage</text>
    <text x="655" y="142" text-anchor="middle" font-size="9" fill="#7c3aed">Feature coverage</text>
    <text x="655" y="153" text-anchor="middle" font-size="9" fill="#7c3aed">Regional coverage</text>
    
    <rect x="750" y="110" width="150" height="50" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="825" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca">Custom SLIs</text>
    <text x="825" y="142" text-anchor="middle" font-size="8" fill="#4338ca">Business metrics</text>
    <text x="825" y="153" text-anchor="middle" font-size="8" fill="#4338ca">User experience</text>
    
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#374151">
            <polygon points="0 0, 10 3.5, 0 7"/>
        </marker>
    </defs>
    
    <!-- Arrow down -->
    <line x1="500" y1="175" x2="500" y2="200" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
    
