    <rect x="60" y="250" width="200" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="160" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">SLO Calculator</text>
    <text x="160" y="285" text-anchor="middle" font-size="10" fill="#c2410c">Rolling windows</text>
    <text x="160" y="298" text-anchor="middle" font-size="10" fill="#c2410c">Time-series math</text>
    <text x="160" y="311" text-anchor="middle" font-size="10" fill="#c2410c">Trend analysis</text>
    
    <rect x="280" y="250" width="200" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="380" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Error Budget</text>
    <text x="380" y="285" text-anchor="middle" font-size="10" fill="#c2410c">Burn rate calc</text>
    <text x="380" y="298" text-anchor="middle" font-size="10" fill="#c2410c">Budget remaining</text>
    <text x="380" y="311" text-anchor="middle" font-size="10" fill="#c2410c">Depletion forecast</text>
    
    <rect x="500" y="250" width="200" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="600" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Multi-Window</text>
    <text x="600" y="285" text-anchor="middle" font-size="10" fill="#c2410c">1h / 6h windows</text>
    <text x="600" y="298" text-anchor="middle" font-size="10" fill="#c2410c">Fast/slow burn</text>
    <text x="600" y="311" text-anchor="middle" font-size="10" fill="#c2410c">Alert conditions</text>
    
    <rect x="720" y="250" width="200" height="70" fill="#fed7aa" stroke="#d97706" stroke-width="2" rx="4"/>
    <text x="820" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">ML Predictor</text>
    <text x="820" y="285" text-anchor="middle" font-size="10" fill="#c2410c">Trend prediction</text>
    <text x="820" y="298" text-anchor="middle" font-size="10" fill="#c2410c">Anomaly detection</text>
    <text x="820" y="311" text-anchor="middle" font-size="10" fill="#c2410c">Risk scoring</text>
    
    <!-- Arrow down -->
